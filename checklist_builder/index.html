<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Builder</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --accent: #3b82f6;
      --accent-light: #eff6ff;
      --accent-border: #bfdbfe;
      --text: #1e293b;
      --muted: #64748b;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --success: #16a34a;
      --preview-bg: #f1f5f9;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --mono: 'Cascadia Code', 'Fira Code', 'Monaco', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); color: var(--text); background: var(--bg); }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Workspace ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 52px);
    }

    /* ── Panels ── */
    .panel { display: flex; flex-direction: column; overflow: hidden; }
    .panel-left { border-right: 1px solid var(--border); }

    .panel-body {
      flex: 1; overflow-y: auto; padding: 20px;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Title field ── */
    .title-field { margin-bottom: 20px; }
    .field-label {
      display: block; font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
    }
    .title-input {
      width: 100%; font-size: 15px; font-weight: 600;
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); background: var(--surface); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .title-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .title-input::placeholder { font-weight: 400; color: #cbd5e1; }

    /* ── Section card ── */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .section-header {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 10px;
      background: var(--accent-light);
      border-bottom: 1px solid var(--accent-border);
      border-radius: 4px 4px 0 0;
    }
    .section-header-left { flex: 1; display: flex; align-items: center; gap: 5px; min-width: 0; }

    .section-name {
      flex: 1; font-size: 13px; font-weight: 600;
      padding: 4px 8px;
      border: 1px solid transparent; border-radius: 4px;
      background: transparent; color: var(--text); outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .section-name:focus { border-color: var(--accent); background: var(--surface); }
    .section-name::placeholder { color: var(--muted); font-weight: 400; }

    /* ── Items ── */
    .items-list { padding: 6px 12px 2px; }

    .item-row {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }

    .check-btn {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      font-size: 18px; line-height: 1; color: var(--muted);
      padding: 2px; border-radius: 3px;
      transition: color 0.12s;
    }
    .check-btn:hover { color: var(--accent); }
    .check-btn.checked { color: var(--success); }

    .item-text {
      flex: 1; font-size: 13px;
      padding: 5px 7px;
      border: 1px solid transparent; border-radius: 4px;
      background: transparent; color: var(--text); outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .item-text:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 2px rgba(59,130,246,0.08); }
    .item-text::placeholder { color: #cbd5e1; }

    .item-actions { display: flex; gap: 2px; flex-shrink: 0; }

    /* ── Icon buttons ── */
    .icon-btn {
      background: none; border: 1px solid transparent; cursor: pointer;
      color: var(--muted); padding: 3px 6px; border-radius: 4px;
      font-size: 11px; line-height: 1;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .icon-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
    .icon-btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .icon-btn.danger:hover:not(:disabled) { background: var(--danger-light); color: var(--danger); border-color: #fecaca; }

    .add-item-btn {
      display: block; margin: 8px 12px 10px;
      padding: 5px 10px; font-size: 12px;
      color: var(--accent); background: none;
      border: 1px dashed var(--accent-border); border-radius: 4px;
      cursor: pointer; text-align: center;
      width: calc(100% - 24px);
      transition: background 0.12s, border-color 0.12s;
    }
    .add-item-btn:hover { background: var(--accent-light); border-color: var(--accent); }

    .add-section-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px; font-size: 13px; font-weight: 500;
      color: var(--accent); background: none;
      border: 2px dashed var(--border); border-radius: 8px;
      cursor: pointer; transition: background 0.12s, border-color 0.12s;
    }
    .add-section-btn:hover { background: var(--accent-light); border-color: var(--accent); }

    /* ── Right panel ── */
    .preview-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .preview-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .export-btns { display: flex; gap: 6px; }

    .btn {
      padding: 6px 14px; font-size: 12px; font-weight: 500;
      border-radius: 5px; border: none; cursor: pointer;
      transition: background 0.12s, box-shadow 0.12s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn-danger { background: var(--danger); color: #fff; font-size: 11px; padding: 5px 10px; }
    .btn-danger:hover { background: #dc2626; }

    .preview-textarea {
      flex: 1; width: 100%; padding: 16px;
      font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
      background: var(--preview-bg); color: var(--text);
      border: none; outline: none; resize: none;
    }

    .preview-footer {
      padding: 7px 16px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .preview-hint { font-size: 11px; color: var(--muted); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e293b; color: #f1f5f9;
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
      z-index: 1000; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Search ── */
    .search-input {
      padding: 5px 12px; font-size: 12px;
      border: 1px solid var(--border); border-radius: 20px;
      background: var(--bg); color: var(--text); outline: none;
      width: 210px; font-family: var(--font);
      transition: border-color .15s, box-shadow .15s;
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    .search-input::placeholder { color: #cbd5e1; }

    @media (max-width: 860px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
      .search-input { width: 140px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-title">☑ Checklist Builder</div>
    <div class="header-sub">Build QA checklists · export to markdown</div>
  </div>
  <input type="search" id="search-query" class="search-input" placeholder="Search items…" autocomplete="off">
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn btn-secondary" id="btn-import-md">Import .md</button>
    <button class="btn btn-danger" id="btn-clear">Clear all</button>
  </div>
</header>
<input type="file" id="file-import-md" accept=".md,.markdown,.txt" style="display:none">

<div class="workspace">
  <!-- Left: builder form -->
  <div class="panel panel-left">
    <div class="panel-body">
      <div class="title-field">
        <label class="field-label" for="checklist-title">Checklist title</label>
        <input id="checklist-title" class="title-input" type="text" placeholder="e.g. Smoke Test — Login Flow">
      </div>
      <div id="sections"></div>
      <button class="add-section-btn" id="btn-add-section">+ Add Section</button>
    </div>
  </div>

  <!-- Right: markdown preview -->
  <div class="panel">
    <div class="preview-bar">
      <span class="preview-label">Markdown preview</span>
      <div class="export-btns">
        <button class="btn btn-secondary" id="btn-copy">Copy</button>
        <button class="btn btn-primary" id="btn-download">Download .md</button>
      </div>
    </div>
    <textarea class="preview-textarea" id="preview" readonly spellcheck="false"></textarea>
    <div class="preview-footer">
      <span class="preview-hint">Live preview · build in the left panel</span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Utilities ──────────────────────────────────────────────────────────────

function uid() { return Math.random().toString(36).slice(2, 9); }

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightText(str, query) {
  if (!query) return escHtml(str);
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return str.split(re).map((p, i) =>
    i % 2 === 1
      ? '<mark style="background:#fef08a;color:#1e293b;border-radius:2px;padding:0 1px">' + escHtml(p) + '</mark>'
      : escHtml(p)
  ).join('');
}

// ── State ──────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'checklist_builder_v1';

function defaultState() {
  return {
    title: '',
    sections: [
      { id: uid(), name: '', items: [{ id: uid(), text: '', checked: false }] }
    ]
  };
}

let state = (function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return defaultState();
})();

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {}
}

// ── Search ─────────────────────────────────────────────────────────────────

let searchQuery = '';

// ── Lookups ────────────────────────────────────────────────────────────────

function findSection(sid) { return state.sections.find(s => s.id === sid); }
function findItem(sid, iid) { const s = findSection(sid); return s && s.items.find(i => i.id === iid); }

// ── DOM helpers ────────────────────────────────────────────────────────────

function iconBtn(label, extraClass, title, disabled) {
  const b = document.createElement('button');
  b.className = 'icon-btn ' + (extraClass || '');
  b.textContent = label;
  b.title = title;
  if (disabled) b.disabled = true;
  return b;
}

function makeItemRow(item, sid, idx, total) {
  const row = document.createElement('div');
  row.className = 'item-row';
  row.dataset.iid = item.id;
  row.dataset.sid = sid;

  const ck = document.createElement('button');
  ck.className = 'check-btn' + (item.checked ? ' checked' : '');
  ck.dataset.iid = item.id; ck.dataset.sid = sid;
  ck.title = item.checked ? 'Uncheck' : 'Check';
  ck.textContent = item.checked ? '☑' : '☐';

  const txt = document.createElement('input');
  txt.type = 'text'; txt.className = 'item-text';
  txt.placeholder = 'Checklist item…';
  txt.dataset.iid = item.id; txt.dataset.sid = sid;
  txt.value = item.text;

  const acts = document.createElement('div');
  acts.className = 'item-actions';

  const up = iconBtn('↑', 'item-up', 'Move up', idx === 0);
  up.dataset.iid = item.id; up.dataset.sid = sid;

  const dn = iconBtn('↓', 'item-down', 'Move down', idx === total - 1);
  dn.dataset.iid = item.id; dn.dataset.sid = sid;

  const del = iconBtn('✕', 'item-del danger', 'Delete item', false);
  del.dataset.iid = item.id; del.dataset.sid = sid;

  acts.append(up, dn, del);
  row.append(ck, txt, acts);
  return row;
}

// ── Render ─────────────────────────────────────────────────────────────────

function render() {
  renderSections();
  renderPreview();
  saveState();
}

function renderSections() {
  const container = document.getElementById('sections');

  // Remember focus so we can restore it after the DOM rebuild
  const active = document.activeElement;
  const focusIid = active && active.dataset && active.dataset.iid;
  const focusSidSection = active && active.classList.contains('section-name') && active.dataset.sid;
  const sel = [active && active.selectionStart, active && active.selectionEnd];

  container.innerHTML = '';

  state.sections.forEach((sec, si) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.dataset.sid = sec.id;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'section-header';

    const hLeft = document.createElement('div');
    hLeft.className = 'section-header-left';

    const secUp = iconBtn('↑', 'sec-up', 'Move section up', si === 0);
    secUp.dataset.sid = sec.id;
    const secDn = iconBtn('↓', 'sec-down', 'Move section down', si === state.sections.length - 1);
    secDn.dataset.sid = sec.id;

    const nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.className = 'section-name';
    nameInput.placeholder = 'Section name (e.g. Login Flow)';
    nameInput.dataset.sid = sec.id;
    nameInput.value = sec.name;

    hLeft.append(secUp, secDn, nameInput);

    const secDel = iconBtn('✕', 'sec-del danger', 'Delete section', false);
    secDel.dataset.sid = sec.id;

    hdr.append(hLeft, secDel);

    // Items
    const list = document.createElement('div');
    list.className = 'items-list';
    sec.items.forEach((item, ii) => list.appendChild(makeItemRow(item, sec.id, ii, sec.items.length)));

    // Add-item button
    const addItem = document.createElement('button');
    addItem.className = 'add-item-btn';
    addItem.dataset.sid = sec.id;
    addItem.textContent = '+ Add item';

    card.append(hdr, list, addItem);
    container.appendChild(card);
  });

  // Apply search filter + highlight
  const q = searchQuery.trim().toLowerCase();
  if (q) {
    let visibleCards = 0;
    container.querySelectorAll('.section-card').forEach(card => {
      const sec = findSection(card.dataset.sid);
      if (!sec) return;
      const secNameMatch = sec.name.toLowerCase().includes(q);
      // Highlight section name
      const nameEl = card.querySelector('.section-name');
      if (nameEl) nameEl.title = sec.name; // keep real value; highlight via overlay not possible on input, skip
      let anyItemVisible = false;
      card.querySelectorAll('.item-row').forEach(row => {
        const item = sec.items.find(i => i.id === row.dataset.iid);
        const show = secNameMatch || (item && item.text.toLowerCase().includes(q));
        row.style.display = show ? '' : 'none';
        if (show) {
          anyItemVisible = true;
          // Highlight text in item input
          if (item) {
            const inp = row.querySelector('.item-text');
            if (inp) inp.style.background = item.text.toLowerCase().includes(q) ? '#fef9c3' : '';
          }
        }
      });
      const showCard = secNameMatch || anyItemVisible;
      card.style.display = showCard ? '' : 'none';
      if (showCard) visibleCards++;
    });
    if (visibleCards === 0) {
      const msg = document.createElement('p');
      msg.style.cssText = 'padding:40px 20px;text-align:center;color:var(--muted);font-size:13px';
      msg.textContent = 'No items match your search';
      container.appendChild(msg);
    }
  } else {
    // Clear any highlights
    container.querySelectorAll('.item-text').forEach(inp => { inp.style.background = ''; });
    container.querySelectorAll('.section-card').forEach(c => { c.style.display = ''; });
    container.querySelectorAll('.item-row').forEach(r => { r.style.display = ''; });
  }

  // Restore focus
  let toFocus = null;
  if (focusIid) {
    toFocus = container.querySelector(`.item-text[data-iid="${focusIid}"]`);
  } else if (focusSidSection) {
    toFocus = container.querySelector(`.section-name[data-sid="${focusSidSection}"]`);
  }
  if (toFocus) {
    toFocus.focus();
    try { toFocus.setSelectionRange(sel[0], sel[1]); } catch (_) {}
  }
}

// ── Markdown ───────────────────────────────────────────────────────────────

function buildMarkdown() {
  const title = (state.title || 'QA Checklist').trim();
  const lines = [`# ${title}`, ''];

  state.sections.forEach(sec => {
    if (sec.name.trim()) lines.push(`## ${sec.name.trim()}`, '');
    sec.items.forEach(item => {
      lines.push(`- ${item.checked ? '[x]' : '[ ]'} ${item.text}`);
    });
    lines.push('');
  });

  return lines.join('\n').trimEnd();
}

function renderPreview() {
  document.getElementById('preview').value = buildMarkdown();
}

// ── Events ─────────────────────────────────────────────────────────────────

// Title — no section re-render needed
document.getElementById('checklist-title').addEventListener('input', e => {
  state.title = e.target.value;
  renderPreview(); saveState();
});

// All other inputs — inline edit without section re-render
document.addEventListener('input', e => {
  const t = e.target;

  if (t.classList.contains('section-name')) {
    const s = findSection(t.dataset.sid);
    if (s) { s.name = t.value; renderPreview(); saveState(); }
    return;
  }
  if (t.classList.contains('item-text')) {
    const item = findItem(t.dataset.sid, t.dataset.iid);
    if (item) { item.text = t.value; renderPreview(); saveState(); }
    return;
  }
});

// Clicks — structural changes trigger full render
document.addEventListener('click', e => {
  const t = e.target.closest('[data-sid],[data-iid],#btn-add-section,#btn-copy,#btn-download,#btn-clear,#btn-import-md');
  if (!t) return;

  // Toggle checked
  if (t.classList.contains('check-btn')) {
    const item = findItem(t.dataset.sid, t.dataset.iid);
    if (item) { item.checked = !item.checked; render(); }
    return;
  }

  // Item reorder
  if (t.classList.contains('item-up') || t.classList.contains('item-down')) {
    const sec = findSection(t.dataset.sid);
    if (!sec) return;
    const idx = sec.items.findIndex(i => i.id === t.dataset.iid);
    const delta = t.classList.contains('item-up') ? -1 : 1;
    const ni = idx + delta;
    if (ni >= 0 && ni < sec.items.length) {
      [sec.items[idx], sec.items[ni]] = [sec.items[ni], sec.items[idx]];
      render();
    }
    return;
  }

  // Delete item
  if (t.classList.contains('item-del')) {
    const sec = findSection(t.dataset.sid);
    if (!sec) return;
    if (sec.items.length === 1) {
      // Keep one empty row rather than leaving section empty
      sec.items[0] = { id: uid(), text: '', checked: false };
    } else {
      sec.items = sec.items.filter(i => i.id !== t.dataset.iid);
    }
    render();
    return;
  }

  // Add item
  if (t.classList.contains('add-item-btn')) {
    const sec = findSection(t.dataset.sid);
    if (!sec) return;
    const newId = uid();
    sec.items.push({ id: newId, text: '', checked: false });
    render();
    // Focus new item after render
    requestAnimationFrame(() => {
      const el = document.querySelector(`.item-text[data-iid="${newId}"]`);
      if (el) el.focus();
    });
    return;
  }

  // Section reorder
  if (t.classList.contains('sec-up') || t.classList.contains('sec-down')) {
    const idx = state.sections.findIndex(s => s.id === t.dataset.sid);
    const delta = t.classList.contains('sec-up') ? -1 : 1;
    const ni = idx + delta;
    if (ni >= 0 && ni < state.sections.length) {
      [state.sections[idx], state.sections[ni]] = [state.sections[ni], state.sections[idx]];
      render();
    }
    return;
  }

  // Delete section
  if (t.classList.contains('sec-del')) {
    if (state.sections.length === 1) {
      state.sections[0].name = '';
      state.sections[0].items = [{ id: uid(), text: '', checked: false }];
    } else {
      state.sections = state.sections.filter(s => s.id !== t.dataset.sid);
    }
    render();
    return;
  }

  // Add section
  if (t.id === 'btn-add-section') {
    const newSid = uid();
    state.sections.push({ id: newSid, name: '', items: [{ id: uid(), text: '', checked: false }] });
    render();
    requestAnimationFrame(() => {
      const el = document.querySelector(`.section-name[data-sid="${newSid}"]`);
      if (el) el.focus();
    });
    return;
  }

  // Copy
  if (t.id === 'btn-copy') {
    const md = buildMarkdown();
    const write = () => navigator.clipboard.writeText(md).then(() => toast('Copied to clipboard!')).catch(() => fallbackCopy(md));
    if (navigator.clipboard) write(); else fallbackCopy(md);
    return;
  }

  // Download
  if (t.id === 'btn-download') {
    const md = buildMarkdown();
    const slug = (state.title || 'qa-checklist').trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, '') || 'qa-checklist';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([md], { type: 'text/markdown;charset=utf-8' }));
    a.download = slug + '.md';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('Downloaded ' + a.download);
    return;
  }

  // Import .md
  if (t.id === 'btn-import-md') {
    const fi = document.getElementById('file-import-md');
    fi.value = '';
    fi.click();
    return;
  }

  // Clear all
  if (t.id === 'btn-clear') {
    if (!confirm('Clear everything and start fresh?')) return;
    state = defaultState();
    document.getElementById('checklist-title').value = '';
    render();
    return;
  }
});

// ── Markdown import ────────────────────────────────────────────────────────

function parseMd(text) {
  const lines = text.split('\n');
  const result = { title: '', sections: [] };
  let currentSection = null;

  for (const raw of lines) {
    const line = raw.trimEnd();

    // H1 → title
    const titleMatch = line.match(/^#(?!#)\s+(.+)$/);
    if (titleMatch) { result.title = titleMatch[1].trim(); continue; }

    // H2 → new section
    const secMatch = line.match(/^##\s+(.+)$/);
    if (secMatch) {
      currentSection = { id: uid(), name: secMatch[1].trim(), items: [] };
      result.sections.push(currentSection);
      continue;
    }

    // Checklist item: - [ ] or - [x]
    const itemMatch = line.match(/^-\s+\[([ xX])\]\s*(.*)$/);
    if (itemMatch) {
      if (!currentSection) {
        currentSection = { id: uid(), name: '', items: [] };
        result.sections.push(currentSection);
      }
      currentSection.items.push({
        id: uid(),
        text: itemMatch[2],
        checked: itemMatch[1].toLowerCase() === 'x'
      });
    }
  }

  if (result.sections.length === 0) return defaultState();
  result.sections.forEach(sec => {
    if (sec.items.length === 0) sec.items.push({ id: uid(), text: '', checked: false });
  });
  return result;
}

document.getElementById('file-import-md').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state = parseMd(ev.target.result);
    document.getElementById('checklist-title').value = state.title;
    render();
    toast('Imported ' + file.name);
  };
  reader.readAsText(file);
});

// ── Toast ──────────────────────────────────────────────────────────────────

let toastTimer;
const toastEl = document.getElementById('toast');

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

function fallbackCopy(text) {
  const ta = Object.assign(document.createElement('textarea'), {
    value: text, style: 'position:fixed;left:-9999px'
  });
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast('Copied!'); } catch (_) { toast('Select text manually to copy'); }
  document.body.removeChild(ta);
}

// ── Search ─────────────────────────────────────────────────────────────────

document.getElementById('search-query').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderSections();
});

// ── Init ───────────────────────────────────────────────────────────────────

document.getElementById('checklist-title').value = state.title;
render();
</script>
