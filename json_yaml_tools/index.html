  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --accent: #3b82f6;
      --accent-light: #eff6ff;
      --text: #1e293b;
      --muted: #64748b;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --mono: 'Cascadia Code', 'Fira Code', 'Monaco', 'Courier New', monospace;
      --add-bg: #dcfce7; --add-text: #14532d; --add-bar: #16a34a;
      --rem-bg: #fee2e2; --rem-text: #7f1d1d; --rem-bar: #dc2626;
      --eq-bg: #f8fafc;  --eq-text: #475569;
      --ln-color: #94a3b8;
      --err-bg: #fef2f2; --err-border: #fecaca; --err-text: #dc2626;
      --ok-bg: #f0fdf4; --ok-border: #bbf7d0; --ok-text: #15803d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); color: var(--text); background: var(--bg); }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 52px;
      display: flex; align-items: center; gap: 14px;
    }
    .header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* Mode / view toggles */
    .mode-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .mode-btn {
      padding: 5px 14px; font-size: 12px; font-weight: 500;
      background: var(--surface); color: var(--muted); border: none; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .mode-btn.active { background: var(--accent); color: #fff; }
    .mode-btn:not(.active):hover { background: var(--bg); color: var(--text); }

    /* ── Workspace ── */
    .workspace { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 52px); }
    .panel { display: flex; flex-direction: column; overflow: hidden; }
    .panel-left { border-right: 1px solid var(--border); }

    /* Panel label bar */
    .panel-label {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-label-text { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* Input textarea */
    .input-textarea {
      flex: 1; width: 100%; padding: 12px 14px;
      font-family: var(--mono); font-size: 12.5px; line-height: 1.65;
      background: var(--surface); color: var(--text);
      border: none; outline: none; resize: none;
      transition: box-shadow 0.15s;
    }
    .input-textarea::placeholder { color: #cbd5e1; }
    .drag-over .input-textarea { box-shadow: inset 0 0 0 2px var(--accent); }
    .drag-zone { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }
    .drag-zone.drag-over::after {
      content: 'Drop file here';
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: var(--accent-light); color: var(--accent);
      font-size: 15px; font-weight: 600; border: 2px dashed var(--accent);
      pointer-events: none; z-index: 5;
    }

    /* Bottom bar of left panel */
    .panel-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
      background: var(--bg);
    }
    .open-btn {
      padding: 4px 10px; font-size: 11px; font-weight: 500;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
      transition: background 0.12s;
    }
    .open-btn:hover { background: var(--border); }
    .indent-toggle { display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; margin-left: auto; }
    .indent-btn {
      padding: 3px 10px; font-size: 11px; font-weight: 500;
      background: var(--surface); color: var(--muted); border: none; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .indent-btn.active { background: var(--accent); color: #fff; }
    .indent-label { font-size: 11px; color: var(--muted); padding: 0 4px; align-self: center; }

    /* Action toolbar (right panel top) */
    .action-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; row-gap: 4px;
      padding: 7px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--bg);
    }
    .action-btn {
      padding: 4px 11px; font-size: 11px; font-weight: 500;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .action-btn:hover { background: var(--border); }
    .action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .action-btn.primary:hover { background: #2563eb; border-color: #2563eb; }
    .sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .copy-btn {
      margin-left: auto; padding: 4px 11px; font-size: 11px; font-weight: 500;
      background: var(--border); color: var(--text); border: none; border-radius: 5px;
      cursor: pointer; transition: background 0.12s;
    }
    .copy-btn:hover { background: #cbd5e1; }

    /* Error / success banner */
    .msg-banner {
      display: none; padding: 8px 14px; font-size: 12px; font-family: var(--mono);
      border-left: 3px solid; flex-shrink: 0; line-height: 1.5;
    }
    .msg-banner.error { background: var(--err-bg); border-color: var(--rem-bar); color: var(--err-text); display: block; }
    .msg-banner.ok    { background: var(--ok-bg);  border-color: var(--add-bar); color: var(--ok-text);  display: block; }

    /* Output textarea */
    .output-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .output-textarea {
      flex: 1; width: 100%; padding: 12px 14px;
      font-family: var(--mono); font-size: 12.5px; line-height: 1.65;
      background: var(--surface); color: var(--text);
      border: none; outline: none; resize: none;
    }
    .output-textarea::-webkit-scrollbar { width: 5px; height: 5px; }
    .output-textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Status bar */
    .status-bar {
      padding: 4px 14px; font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg);
      min-height: 24px;
    }

    /* SBS diff (YAML diff view) */
    .sbs-outer { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .sbs-wrap { display: grid; grid-template-columns: 1fr 1fr; height: 100%; overflow: hidden; }
    .sbs-col { overflow-y: auto; overflow-x: auto; font-family: var(--mono); font-size: 12px; line-height: 1.6; border-right: 1px solid var(--border); }
    .sbs-col:last-child { border-right: none; }
    .sbs-col::-webkit-scrollbar { width: 4px; height: 4px; }
    .sbs-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .sbs-header { position: sticky; top: 0; z-index: 1; background: var(--bg); border-bottom: 1px solid var(--border); padding: 5px 12px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .sbs-line { display: flex; align-items: baseline; white-space: pre; border-left: 3px solid transparent; padding: 0 12px 0 0; }
    .sbs-line.add   { background: var(--add-bg); border-left-color: var(--add-bar); color: var(--add-text); }
    .sbs-line.rem   { background: var(--rem-bg); border-left-color: var(--rem-bar); color: var(--rem-text); }
    .sbs-line.eq    { background: var(--eq-bg); color: var(--eq-text); }
    .sbs-line.blank { background: #f1f5f9; }
    .ln { display: inline-block; min-width: 38px; padding: 0 8px; text-align: right; color: var(--ln-color); font-size: 11px; flex-shrink: 0; user-select: none; }
    .diff-text { padding-left: 4px; min-width: 0; flex: 1; }

    /* Empty / placeholder state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; color: var(--muted);
    }
    .empty-state .icon { font-size: 36px; opacity: 0.35; }
    .empty-state p { font-size: 12px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1e293b; color: #f1f5f9;
      padding: 9px 16px; border-radius: 8px; font-size: 12px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s, transform 0.18s; z-index: 1000; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .clear-btn {
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: #94a3b8; padding: 2px 6px; border-radius: 3px;
      transition: background 0.12s, color 0.12s;
    }
    .clear-btn:hover { background: var(--border); color: var(--text); }

    @media (max-width: 860px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div style="flex:1;min-width:0">
    <div class="header-title">{ } JSON / YAML Tools</div>
    <div class="header-sub">Validate, format, and convert JSON and YAML files — works offline</div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" data-tab="json">JSON</button>
    <button class="mode-btn" data-tab="yaml">YAML</button>
  </div>
</header>

<!-- ══════════════ JSON WORKSPACE ══════════════ -->
<div id="json-workspace" class="workspace">

  <!-- Left: input -->
  <div class="panel panel-left">
    <div class="panel-label">
      <span class="panel-label-text">Input</span>
      <button class="clear-btn" id="json-clear">Clear</button>
    </div>
    <div class="drag-zone" id="json-drop-zone">
      <textarea id="json-input" class="input-textarea"
        placeholder="Paste JSON here or drop a .json file…"
        spellcheck="false"></textarea>
    </div>
    <div class="panel-footer">
      <button class="open-btn" id="json-open-btn">📂 Open file</button>
      <input type="file" id="json-file-input" accept=".json,.txt" style="display:none">
      <span class="indent-label">Indent:</span>
      <div class="indent-toggle">
        <button class="indent-btn active" data-indent="2">2</button>
        <button class="indent-btn" data-indent="4">4</button>
      </div>
    </div>
  </div>

  <!-- Right: output -->
  <div class="panel">
    <div class="action-bar">
      <button class="action-btn primary" id="json-validate-btn">Validate</button>
      <button class="action-btn" id="json-beautify-btn">Beautify</button>
      <button class="action-btn" id="json-compact-btn">Compact</button>
      <button class="copy-btn" id="json-copy-btn">Copy</button>
    </div>
    <div id="json-banner" class="msg-banner"></div>
    <div class="output-wrap">
      <textarea id="json-output" class="output-textarea" readonly
        placeholder="Output appears here…"
        spellcheck="false"></textarea>
    </div>
    <div class="status-bar" id="json-status"></div>
  </div>

</div>

<!-- ══════════════ YAML WORKSPACE ══════════════ -->
<div id="yaml-workspace" class="workspace" style="display:none">

  <!-- Left: input -->
  <div class="panel panel-left">
    <div class="panel-label">
      <span class="panel-label-text">Input</span>
      <button class="clear-btn" id="yaml-clear">Clear</button>
    </div>
    <div class="drag-zone" id="yaml-drop-zone">
      <textarea id="yaml-input" class="input-textarea"
        placeholder="Paste YAML here or drop a .yaml / .yml file…"
        spellcheck="false"></textarea>
    </div>
    <div class="panel-footer">
      <button class="open-btn" id="yaml-open-btn">📂 Open file</button>
      <input type="file" id="yaml-file-input" accept=".yaml,.yml,.txt" style="display:none">
    </div>
  </div>

  <!-- Right: output -->
  <div class="panel">
    <div class="action-bar">
      <button class="action-btn primary" id="yaml-validate-btn">Validate</button>
      <button class="action-btn" id="yaml-fix-btn">Fix / Normalize</button>
      <div class="sep"></div>
      <div class="mode-toggle" id="yaml-view-toggle">
        <button class="mode-btn active" data-yview="fixed">Fixed</button>
        <button class="mode-btn" data-yview="diff">Diff</button>
      </div>
      <button class="copy-btn" id="yaml-copy-btn">Copy</button>
    </div>
    <div id="yaml-banner" class="msg-banner"></div>

    <!-- Fixed view -->
    <div id="yaml-fixed-view" class="output-wrap">
      <textarea id="yaml-output" class="output-textarea" readonly
        placeholder="Normalized YAML appears here after Fix / Normalize…"
        spellcheck="false"></textarea>
    </div>

    <!-- Diff view -->
    <div id="yaml-diff-view" class="sbs-outer" style="display:none">
      <div class="sbs-wrap">
        <div class="sbs-col" id="yaml-sbs-left">
          <div class="sbs-header">Original YAML</div>
        </div>
        <div class="sbs-col" id="yaml-sbs-right">
          <div class="sbs-header">Normalized YAML</div>
        </div>
      </div>
    </div>

    <!-- Empty state for diff -->
    <div id="yaml-empty" class="empty-state" style="display:none">
      <div class="icon">≋</div>
      <p>Click "Fix / Normalize" to see alignment changes</p>
    </div>

    <div class="status-bar" id="yaml-status"></div>
  </div>

</div>

<div id="toast"></div>

<script>
'use strict';

// ── Utilities ──────────────────────────────────────────────────────────────

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function diffLines(oldArr, newArr) {
  const m = oldArr.length, n = newArr.length;
  const dp = new Array(m + 1);
  for (let i = 0; i <= m; i++) dp[i] = new Uint32Array(n + 1);
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oldArr[i-1] === newArr[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const result = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && oldArr[i-1] === newArr[j-1]) { result.push({ type: 'eq',  text: oldArr[i-1] }); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { result.push({ type: 'add', text: newArr[j-1] }); j--; }
    else { result.push({ type: 'rem', text: oldArr[i-1] }); i--; }
  }
  return result.reverse();
}

let toastTimer;
const toastEl = document.getElementById('toast');
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}
function fallbackCopy(text) {
  const ta = Object.assign(document.createElement('textarea'), { value: text, style: 'position:fixed;left:-9999px' });
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast('Copied!'); } catch (_) { toast('Copy failed'); }
  document.body.removeChild(ta);
}
function copyText(text) {
  if (!text) { toast('Nothing to copy'); return; }
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => fallbackCopy(text));
  else fallbackCopy(text);
}

function setupDropZone(zoneEl, textareaEl, onLoad) {
  zoneEl.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; zoneEl.classList.add('drag-over'); });
  zoneEl.addEventListener('dragleave', () => zoneEl.classList.remove('drag-over'));
  zoneEl.addEventListener('drop', e => {
    e.preventDefault(); zoneEl.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { textareaEl.value = ev.target.result; onLoad(); };
    reader.readAsText(file, 'utf-8');
  });
}

// ── Tab switching ──────────────────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('header .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('json-workspace').style.display = tab === 'json' ? 'grid' : 'none';
  document.getElementById('yaml-workspace').style.display = tab === 'yaml' ? 'grid' : 'none';
}

document.querySelectorAll('header .mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── JSON Tab ───────────────────────────────────────────────────────────────

let jsonIndent = 2;

const jsonInput    = document.getElementById('json-input');
const jsonOutput   = document.getElementById('json-output');
const jsonBanner   = document.getElementById('json-banner');
const jsonStatus   = document.getElementById('json-status');

function jsonOffsetToLineCol(text, offset) {
  const before = text.slice(0, Math.min(offset, text.length));
  const lines = before.split('\n');
  return { line: lines.length, col: lines[lines.length - 1].length + 1 };
}

function showJsonBanner(type, msg) {
  jsonBanner.className = 'msg-banner ' + type;
  jsonBanner.textContent = msg;
}
function clearJsonBanner() {
  jsonBanner.className = 'msg-banner';
  jsonBanner.textContent = '';
}

function parseJsonInput() {
  const text = jsonInput.value.trim();
  if (!text) return { ok: false, empty: true };
  try {
    return { ok: true, parsed: JSON.parse(text) };
  } catch (e) {
    const msg = e.message || String(e);
    const posMatch = msg.match(/position (\d+)/i);
    let location = '';
    if (posMatch) {
      const { line, col } = jsonOffsetToLineCol(jsonInput.value, parseInt(posMatch[1], 10));
      location = ` (Line ${line}, Col ${col})`;
    }
    return { ok: false, error: msg + location };
  }
}

function jsonValidate() {
  const text = jsonInput.value.trim();
  if (!text) { clearJsonBanner(); jsonStatus.textContent = ''; return; }
  const result = parseJsonInput();
  if (result.ok) {
    showJsonBanner('ok', 'Valid JSON');
    const lines = jsonInput.value.split('\n').length;
    const chars = jsonInput.value.length;
    jsonStatus.textContent = `Valid JSON · ${lines} line${lines !== 1 ? 's' : ''} · ${chars.toLocaleString()} chars`;
  } else {
    showJsonBanner('error', result.error);
    jsonStatus.textContent = '';
  }
}

function jsonBeautify() {
  const result = parseJsonInput();
  if (result.empty) { jsonStatus.textContent = 'Nothing to process'; return; }
  if (!result.ok) { showJsonBanner('error', result.error); return; }
  clearJsonBanner();
  const out = JSON.stringify(result.parsed, null, jsonIndent);
  jsonOutput.value = out;
  const lines = out.split('\n').length;
  jsonStatus.textContent = `Beautified · ${lines} line${lines !== 1 ? 's' : ''} · ${out.length.toLocaleString()} chars`;
}

function jsonCompact() {
  const result = parseJsonInput();
  if (result.empty) { jsonStatus.textContent = 'Nothing to process'; return; }
  if (!result.ok) { showJsonBanner('error', result.error); return; }
  clearJsonBanner();
  const out = JSON.stringify(result.parsed);
  const wasAlready = jsonInput.value.trim() === out;
  jsonOutput.value = out;
  jsonStatus.textContent = wasAlready ? 'Already compact · ' + out.length.toLocaleString() + ' chars' : 'Compacted · 1 line · ' + out.length.toLocaleString() + ' chars';
}

document.getElementById('json-validate-btn').addEventListener('click', jsonValidate);
document.getElementById('json-beautify-btn').addEventListener('click', jsonBeautify);
document.getElementById('json-compact-btn').addEventListener('click', jsonCompact);
document.getElementById('json-copy-btn').addEventListener('click', () => copyText(jsonOutput.value));
document.getElementById('json-clear').addEventListener('click', () => {
  jsonInput.value = ''; jsonOutput.value = ''; clearJsonBanner(); jsonStatus.textContent = '';
});

// Indent toggle
document.querySelectorAll('.indent-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    jsonIndent = parseInt(btn.dataset.indent, 10);
    document.querySelectorAll('.indent-btn').forEach(b => b.classList.toggle('active', b === btn));
  });
});

// File input
document.getElementById('json-open-btn').addEventListener('click', () => {
  const fi = document.getElementById('json-file-input');
  fi.value = ''; fi.click();
});
document.getElementById('json-file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { jsonInput.value = ev.target.result; clearJsonBanner(); jsonStatus.textContent = 'File loaded: ' + file.name; };
  reader.readAsText(file, 'utf-8');
});

// Drag-drop
setupDropZone(document.getElementById('json-drop-zone'), jsonInput, () => {
  clearJsonBanner(); jsonStatus.textContent = '';
});

// Auto-clear banner on input change
jsonInput.addEventListener('input', () => { clearJsonBanner(); jsonStatus.textContent = ''; });

// ── YAML Tab ───────────────────────────────────────────────────────────────

const yamlInput   = document.getElementById('yaml-input');
const yamlOutput  = document.getElementById('yaml-output');
const yamlBanner  = document.getElementById('yaml-banner');
const yamlStatus  = document.getElementById('yaml-status');
const yamlSbsL    = document.getElementById('yaml-sbs-left');
const yamlSbsR    = document.getElementById('yaml-sbs-right');

let yamlView = 'fixed';
let yamlFixedText = '';

function showYamlBanner(type, msg) {
  yamlBanner.className = 'msg-banner ' + type;
  yamlBanner.textContent = msg;
}
function clearYamlBanner() {
  yamlBanner.className = 'msg-banner';
  yamlBanner.textContent = '';
}

function parseYamlInput() {
  const text = yamlInput.value.trim();
  if (!text) return { ok: false, empty: true };
  try {
    const parsed = jsyaml.load(text);
    return { ok: true, parsed };
  } catch (e) {
    let msg = e.reason || e.message || String(e);
    if (e.mark) msg += ` (Line ${e.mark.line + 1}, Col ${e.mark.column + 1})`;
    return { ok: false, error: msg };
  }
}

function yamlValidate() {
  const text = yamlInput.value.trim();
  if (!text) { clearYamlBanner(); yamlStatus.textContent = ''; return; }
  const result = parseYamlInput();
  if (result.ok) {
    const isMultiDoc = (text.match(/^---/gm) || []).length > 1;
    showYamlBanner('ok', 'Valid YAML' + (isMultiDoc ? ' — note: multi-document files are partially supported (first document only)' : ''));
    const lines = yamlInput.value.split('\n').length;
    yamlStatus.textContent = `Valid YAML · ${lines} line${lines !== 1 ? 's' : ''} · ${yamlInput.value.length.toLocaleString()} chars`;
  } else {
    showYamlBanner('error', result.error);
    yamlStatus.textContent = '';
  }
}

function normalizeYaml(text) {
  const parsed = jsyaml.load(text);
  return jsyaml.dump(parsed, { indent: 2, lineWidth: -1, noRefs: true });
}

function renderYamlDiff(origText, fixedText) {
  const origLines  = origText.split('\n');
  const fixedLines = fixedText.split('\n');
  // Remove trailing empty line added by jsyaml.dump
  if (fixedLines[fixedLines.length - 1] === '') fixedLines.pop();

  const diff = diffLines(origLines, fixedLines);

  const left = [], right = [];
  let oldLn = 0, newLn = 0;
  for (const d of diff) {
    if (d.type === 'eq')  { oldLn++; newLn++; left.push({type:'eq',  ln:oldLn, text:d.text}); right.push({type:'eq',  ln:newLn, text:d.text}); }
    else if (d.type === 'rem') { oldLn++; left.push({type:'rem', ln:oldLn, text:d.text}); right.push({type:'blank', ln:'', text:''}); }
    else { newLn++; left.push({type:'blank', ln:'', text:''}); right.push({type:'add', ln:newLn, text:d.text}); }
  }

  const colHtml = lines => lines.map(l =>
    `<div class="sbs-line ${l.type}"><span class="ln">${l.ln}</span><span class="diff-text">${l.text ? escHtml(l.text) : '&nbsp;'}</span></div>`
  ).join('');

  yamlSbsL.innerHTML = '<div class="sbs-header">Original YAML</div>' + colHtml(left);
  yamlSbsR.innerHTML = '<div class="sbs-header">Normalized YAML</div>' + colHtml(right);

  let syncing = false;
  [yamlSbsL, yamlSbsR].forEach((col, idx) => {
    const other = idx === 0 ? yamlSbsR : yamlSbsL;
    col.addEventListener('scroll', () => { if (syncing) return; syncing = true; other.scrollTop = col.scrollTop; syncing = false; });
  });

  const adds = diff.filter(d => d.type === 'add').length;
  const rems = diff.filter(d => d.type === 'rem').length;
  return { adds, rems };
}

function setYamlOutputView(view) {
  yamlView = view;
  document.querySelectorAll('#yaml-view-toggle .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.yview === view));
  const fixedView = document.getElementById('yaml-fixed-view');
  const diffView  = document.getElementById('yaml-diff-view');
  const emptyEl   = document.getElementById('yaml-empty');

  if (view === 'fixed') {
    fixedView.style.display = 'flex';
    diffView.style.display  = 'none';
    emptyEl.style.display   = 'none';
  } else {
    fixedView.style.display = 'none';
    if (yamlFixedText) {
      diffView.style.display = 'flex';
      emptyEl.style.display  = 'none';
      const { adds, rems } = renderYamlDiff(yamlInput.value, yamlFixedText);
      if (adds === 0 && rems === 0) {
        yamlStatus.textContent = 'No alignment changes needed';
      } else {
        yamlStatus.textContent = `${adds} line${adds !== 1 ? 's' : ''} added · ${rems} line${rems !== 1 ? 's' : ''} removed`;
      }
    } else {
      diffView.style.display = 'none';
      emptyEl.style.display  = 'flex';
    }
  }
}

function yamlFix() {
  const text = yamlInput.value.trim();
  if (!text) { yamlStatus.textContent = 'Nothing to process'; return; }
  const result = parseYamlInput();
  if (!result.ok) { showYamlBanner('error', result.error); return; }
  clearYamlBanner();

  const isMultiDoc = (text.match(/^---/gm) || []).length > 1;

  try {
    yamlFixedText = normalizeYaml(text);
    // Remove trailing newline for display in textarea
    yamlOutput.value = yamlFixedText.replace(/\n$/, '');

    if (isMultiDoc) {
      showYamlBanner('ok', 'Normalized (first document only — multi-document files are partially supported)');
    }

    if (yamlView === 'fixed') {
      const lines = yamlOutput.value.split('\n').length;
      yamlStatus.textContent = `Normalized · ${lines} line${lines !== 1 ? 's' : ''} · ${yamlOutput.value.length.toLocaleString()} chars`;
    } else {
      setYamlOutputView('diff');
    }
  } catch (e) {
    showYamlBanner('error', 'Normalization failed: ' + (e.message || String(e)));
  }
}

document.getElementById('yaml-validate-btn').addEventListener('click', yamlValidate);
document.getElementById('yaml-fix-btn').addEventListener('click', yamlFix);
document.getElementById('yaml-copy-btn').addEventListener('click', () => {
  const text = yamlView === 'fixed' ? yamlOutput.value : yamlFixedText.replace(/\n$/, '');
  copyText(text);
});
document.getElementById('yaml-clear').addEventListener('click', () => {
  yamlInput.value = ''; yamlOutput.value = ''; yamlFixedText = '';
  clearYamlBanner(); yamlStatus.textContent = '';
  yamlSbsL.innerHTML = '<div class="sbs-header">Original YAML</div>';
  yamlSbsR.innerHTML = '<div class="sbs-header">Normalized YAML</div>';
  setYamlOutputView('fixed');
});

document.querySelectorAll('#yaml-view-toggle .mode-btn').forEach(btn => {
  btn.addEventListener('click', () => setYamlOutputView(btn.dataset.yview));
});

// File input
document.getElementById('yaml-open-btn').addEventListener('click', () => {
  const fi = document.getElementById('yaml-file-input');
  fi.value = ''; fi.click();
});
document.getElementById('yaml-file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    yamlInput.value = ev.target.result; clearYamlBanner();
    yamlStatus.textContent = 'File loaded: ' + file.name;
    yamlFixedText = ''; yamlOutput.value = '';
  };
  reader.readAsText(file, 'utf-8');
});

// Drag-drop
setupDropZone(document.getElementById('yaml-drop-zone'), yamlInput, () => {
  clearYamlBanner(); yamlStatus.textContent = ''; yamlFixedText = ''; yamlOutput.value = '';
});

// Auto-clear banner on input change
yamlInput.addEventListener('input', () => { clearYamlBanner(); yamlStatus.textContent = ''; yamlFixedText = ''; yamlOutput.value = ''; });

// ── Init ───────────────────────────────────────────────────────────────────

switchTab('json');
setYamlOutputView('fixed');
</script>
</body>
