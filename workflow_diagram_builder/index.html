<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow Diagram Builder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-bg: #f9fafb;
  --color-surface: #ffffff;
  --color-border: #e5e7eb;
  --color-accent: #3b82f6;
  --color-accent-hover: #2563eb;
  --color-text: #111827;
  --color-text-muted: #6b7280;
  --color-danger: #ef4444;
  --radius: 8px;
  --header-h: 52px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: var(--color-text);
  background: var(--color-bg);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  height: var(--header-h);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: nowrap;
}
header h1 { font-size: 14px; font-weight: 700; margin-right: auto; white-space: nowrap; }

.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px; border-radius: var(--radius);
  border: 1px solid var(--color-border);
  background: var(--color-surface); color: var(--color-text);
  font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
  transition: background 0.12s, border-color 0.12s;
}
.btn:hover { background: var(--color-bg); border-color: #9ca3af; }
.btn.active { background: #eff6ff; border-color: var(--color-accent); color: var(--color-accent); }
.btn.primary { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
.btn.primary:hover { background: var(--color-accent-hover); border-color: var(--color-accent-hover); }
.btn.danger { color: var(--color-danger); border-color: #fca5a5; }
.btn.danger:hover { background: #fef2f2; }
.btn:disabled { opacity: 0.4; pointer-events: none; }

.sep { width: 1px; height: 22px; background: var(--color-border); flex-shrink: 0; }

.dir-toggle { display: inline-flex; border: 1px solid var(--color-border); border-radius: 6px; overflow: hidden; }
.dir-toggle button {
  padding: 4px 9px; font-size: 11px; font-weight: 500;
  border: none; background: var(--color-surface); color: var(--color-text-muted);
  cursor: pointer; transition: background 0.12s, color 0.12s;
}
.dir-toggle button.active { background: var(--color-accent); color: #fff; }
.dir-toggle button:first-child { border-right: 1px solid var(--color-border); }

/* ── Layout ── */
main { display: grid; grid-template-columns: 320px 1fr; flex: 1; overflow: hidden; }

/* ── Left Panel ── */
#left-panel {
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.panel-placeholder {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 20px; text-align: center; color: var(--color-text-muted); gap: 10px;
}
.panel-placeholder svg { opacity: 0.25; }
.panel-placeholder p { font-size: 12px; line-height: 1.6; }

#editor-form { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-label {
  font-size: 11px; font-weight: 700; color: var(--color-text-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.chip-type {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; width: fit-content;
}
.chip-type.startend { background: #d1fae5; color: #065f46; }
.chip-type.process   { background: #dbeafe; color: #1e40af; }
.chip-type.decision  { background: #fef3c7; color: #92400e; }
.chip-type.connector { background: #f3f4f6; color: #374151; }
.chip-type.freeline  { background: #fce7f3; color: #9d174d; }

input[type="text"], textarea, input[type="number"] {
  width: 100%; padding: 6px 9px;
  border: 1px solid var(--color-border); border-radius: var(--radius);
  font-size: 12px; font-family: inherit; color: var(--color-text); background: var(--color-bg);
  transition: border-color 0.12s;
}
input[type="text"]:focus, textarea:focus, input[type="number"]:focus {
  outline: none; border-color: var(--color-accent); background: var(--color-surface);
}
textarea { min-height: 64px; resize: vertical; }
input[type="number"] { width: 64px; }

.wrap-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.wrap-row label { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; }
.wrap-row label input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--color-accent); }
.wrap-row .small-lbl { font-size: 11px; color: var(--color-text-muted); }

.notes-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0 4px; border-top: 1px solid var(--color-border);
}
.notes-header span { font-size: 11px; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.btn-sm {
  padding: 3px 8px; font-size: 11px; border-radius: 5px;
  border: 1px solid var(--color-border); background: var(--color-surface); cursor: pointer; color: var(--color-text);
  transition: background 0.12s;
}
.btn-sm:hover { background: var(--color-bg); }
.btn-sm.accent { border-color: var(--color-accent); color: var(--color-accent); }
.btn-sm.accent:hover { background: #eff6ff; }
.btn-sm.del { border-color: #fca5a5; color: var(--color-danger); }
.btn-sm.del:hover { background: #fef2f2; }
#notes-list { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
.note-item { display: flex; flex-direction: column; gap: 3px; }
.note-item-hdr { display: flex; justify-content: space-between; align-items: center; }
.note-item-hdr span { font-size: 11px; color: var(--color-text-muted); font-weight: 600; }

/* ── Right Panel ── */
#right-panel { display: flex; flex-direction: column; overflow: hidden; }

#shape-palette {
  background: var(--color-surface); border-bottom: 1px solid var(--color-border);
  padding: 7px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: nowrap;
}
#shape-palette > .pal-label { font-size: 11px; color: var(--color-text-muted); font-weight: 600; white-space: nowrap; }
.shape-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  cursor: grab; border: 1.5px solid transparent; user-select: none;
  transition: opacity 0.12s, transform 0.1s;
}
.shape-chip:hover { opacity: 0.85; transform: translateY(-1px); }
.shape-chip:active { cursor: grabbing; }
.shape-chip.startend { background: #d1fae5; border-color: #059669; color: #065f46; }
.shape-chip.process  { background: #dbeafe; border-color: #2563eb; color: #1e40af; }
.shape-chip.decision { background: #fef3c7; border-color: #d97706; color: #92400e; }
.pal-hint { margin-left: auto; font-size: 10px; color: #9ca3af; white-space: nowrap; }

/* ── Canvas ── */
#canvas-wrapper {
  flex: 1; overflow: auto; position: relative; cursor: default;
  background-color: #f1f5f9;
  background-image:
    linear-gradient(rgba(0,0,0,0.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.055) 1px, transparent 1px);
  background-size: 20px 20px;
}
#canvas-wrapper.connect-mode { cursor: crosshair; }
#canvas-wrapper.line-mode    { cursor: crosshair; }
#diagram-svg { display: block; overflow: visible; }

/* ── SVG node styles ── */
.node-shape { cursor: pointer; }
.node-group.selected .node-shape { stroke-width: 3 !important; filter: drop-shadow(0 0 5px rgba(59,130,246,0.45)); }
.node-group.selected .startend-shape { stroke: #059669 !important; }
.node-group.selected .process-shape  { stroke: #2563eb !important; }
.node-group.selected .decision-shape { stroke: #d97706 !important; }

.node-label {
  pointer-events: none; text-anchor: middle;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  font-size: 12px; font-weight: 600; fill: #1f2937;
}

.handle {
  fill: var(--color-accent); stroke: #fff; stroke-width: 1.5;
  opacity: 0.22; cursor: crosshair; pointer-events: all;
  transition: opacity 0.15s, r 0.1s;
}
.node-group:hover .handle { opacity: 1; }

/* ── Connection styles ── */
.conn-path {
  fill: none; stroke: #374151; stroke-width: 2;
  cursor: pointer; transition: stroke 0.12s;
}
.conn-hit { fill: none; stroke: transparent; stroke-width: 14; cursor: pointer; }
.conn-group.selected .conn-path { stroke: var(--color-accent); stroke-width: 2.5; }
.conn-label {
  text-anchor: middle; dominant-baseline: middle;
  font-family: Arial, sans-serif; font-size: 11px; fill: #374151; pointer-events: none;
}
.conn-label-bg { fill: rgba(255,255,255,0.88); pointer-events: none; }

/* ── Free line styles ── */
.fl-path { fill: none; stroke: #6b7280; stroke-width: 2; cursor: pointer; }
.fl-hit  { fill: none; stroke: transparent; stroke-width: 14; cursor: pointer; }
.fl-group.selected .fl-path { stroke: var(--color-accent); stroke-width: 2.5; }

/* ── Rubber band ── */
#rubber-band {
  fill: none; stroke: var(--color-accent); stroke-width: 1.5;
  stroke-dasharray: 6 4; pointer-events: none;
}

/* ── Note card SVG styles (class-based for inlineStyles) ── */
.note-card-rect  { fill: #fef9c3; stroke: #fbbf24; stroke-width: 1.2; }
.note-card-fold  { fill: #fbbf24; }
.note-card-num   { font-family: Arial,sans-serif; font-size: 9px; font-weight: 700; fill: #92400e; }
.note-card-text  { font-family: Arial,sans-serif; font-size: 10px; fill: #1f2937; }
.note-card-text2 { font-family: Arial,sans-serif; font-size: 10px; fill: #374151; }
.note-card-stem  { stroke: #fbbf24; stroke-width: 1; stroke-dasharray: 3 2; }
</style>
</head>
<body>

<header>
  <h1>⬡ Workflow Diagram Builder</h1>

  <div class="dir-toggle" title="Connection direction for new arrows">
    <button id="btn-oneway" class="active" onclick="setDirection('one-way')">→ One-way</button>
    <button id="btn-twoway" onclick="setDirection('two-way')">↔ Two-way</button>
  </div>
  <div class="sep"></div>

  <button class="btn" id="btn-connect" onclick="toggleConnectMode()" title="Click a node handle to start, click target node to finish. Esc cancels.">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="2" cy="6.5" r="1.4"/><circle cx="11" cy="6.5" r="1.4"/>
      <line x1="3.4" y1="6.5" x2="9.6" y2="6.5"/>
      <polyline points="8.2,5 9.6,6.5 8.2,8"/>
    </svg>
    Connect
  </button>

  <button class="btn" id="btn-line" onclick="toggleLineMode()" title="Click and drag on canvas to draw a line">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8">
      <line x1="2" y1="11" x2="11" y2="2"/>
      <circle cx="2" cy="11" r="1.2" fill="currentColor"/>
      <circle cx="11" cy="2" r="1.2" fill="currentColor"/>
    </svg>
    Line
  </button>

  <button class="btn danger" id="btn-delete" onclick="deleteSelected()" disabled>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7">
      <polyline points="1,3 11,3"/><path d="M3.5 3V2h5v1"/>
      <rect x="1.5" y="3" width="9" height="8" rx="1"/>
      <line x1="4.5" y1="5.5" x2="4.5" y2="8.5"/><line x1="7.5" y1="5.5" x2="7.5" y2="8.5"/>
    </svg>
    Delete
  </button>
  <div class="sep"></div>

  <button class="btn primary" onclick="exportMarkdown()">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7">
      <path d="M6.5 1H2.5a1 1 0 00-1 1v8a1 1 0 001 1h7a1 1 0 001-1V5z"/><polyline points="6.5,1 6.5,5 10.5,5"/>
    </svg>
    Export .md
  </button>

  <button class="btn" onclick="exportPNG()">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7">
      <rect x="1" y="1" width="10" height="10" rx="1.5"/>
      <circle cx="3.8" cy="3.8" r="1.1"/>
      <polyline points="1,8.5 3.5,6 5.5,7.5 8,4.5 11,7.5"/>
    </svg>
    Export .png
  </button>
  <div class="sep"></div>
  <button class="btn" onclick="triggerImport()" title="Import a previously exported .md file to restore the diagram">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7">
      <path d="M6.5 1H2.5a1 1 0 00-1 1v8a1 1 0 001 1h7a1 1 0 001-1V5z"/><polyline points="6.5,1 6.5,5 10.5,5"/>
      <line x1="6" y1="10" x2="6" y2="6"/><polyline points="4,8 6,10 8,8"/>
    </svg>
    Import .md
  </button>
  <input type="file" id="file-input" accept=".md,text/markdown" style="display:none" onchange="importMarkdown(this)">
  <button class="btn" onclick="clearAll()">Clear</button>
</header>

<main>
  <!-- ── Left Panel ── -->
  <aside id="left-panel">
    <div id="panel-placeholder" class="panel-placeholder">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="5" y="16" width="18" height="12" rx="2"/>
        <ellipse cx="38" cy="12" rx="8" ry="6"/>
        <polygon points="38,30 46,42 30,42"/>
        <line x1="23" y1="22" x2="30" y2="16"/>
        <line x1="23" y1="24" x2="30" y2="36"/>
      </svg>
      <p>Drag a shape onto the canvas, then click a node to edit its label, description, and notes here.</p>
    </div>

    <div id="editor-form" style="display:none">
      <div class="field-group">
        <span class="field-label">Type</span>
        <span id="editor-type-chip" class="chip-type"></span>
      </div>

      <div class="field-group" id="node-title-group">
        <span class="field-label">Label</span>
        <input type="text" id="editor-title" placeholder="Node label…" oninput="syncTitle()">
        <div class="wrap-row" style="margin-top:4px">
          <label title="When checked, long labels are trimmed to fit the shape. Uncheck to show all text.">
            <input type="checkbox" id="chk-trim" onchange="syncTrimLabel()" checked> Trim label
          </label>
          <span class="small-lbl">Max chars/line:</span>
          <input type="number" id="inp-maxchars" value="16" min="6" max="60" onchange="syncMaxChars()" title="Characters per line before wrapping">
        </div>
      </div>

      <div class="field-group" id="conn-label-group" style="display:none">
        <span class="field-label">Connector label</span>
        <input type="text" id="editor-conn-label" placeholder="Optional label on arrow…" oninput="syncConnLabel()">
      </div>

      <div class="field-group">
        <span class="field-label">Description</span>
        <textarea id="editor-desc" placeholder="Describe this element…" oninput="syncDesc()"></textarea>
      </div>

      <div id="notes-section">
        <div class="notes-header">
          <span>Notes <span id="notes-count" style="opacity:0.5"></span></span>
          <button class="btn-sm accent" id="btn-add-note" onclick="addNote()">+ Add note</button>
        </div>
        <div id="notes-list"></div>
      </div>
    </div>
  </aside>

  <!-- ── Right Panel ── -->
  <section id="right-panel">
    <div id="shape-palette">
      <span class="pal-label">Shapes:</span>
      <div class="shape-chip startend" draggable="true" data-shape="startend" ondragstart="paletteDragStart(event)">
        <svg width="26" height="14" viewBox="0 0 26 14">
          <ellipse cx="13" cy="7" rx="12" ry="6" fill="#d1fae5" stroke="#059669" stroke-width="1.4"/>
        </svg>
        Start/End
      </div>
      <div class="shape-chip process" draggable="true" data-shape="process" ondragstart="paletteDragStart(event)">
        <svg width="20" height="14" viewBox="0 0 20 14">
          <rect x="1" y="1" width="18" height="12" rx="2.5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4"/>
        </svg>
        Process
      </div>
      <div class="shape-chip decision" draggable="true" data-shape="decision" ondragstart="paletteDragStart(event)">
        <svg width="20" height="14" viewBox="0 0 20 14">
          <polygon points="10,1 19,7 10,13 1,7" fill="#fef3c7" stroke="#d97706" stroke-width="1.4"/>
        </svg>
        Decision
      </div>
      <span class="pal-hint">Drag shapes to canvas · Hover node for handles · Esc cancels</span>
    </div>

    <div id="canvas-wrapper"
         ondragover="canvasDragOver(event)"
         ondrop="canvasDrop(event)">
      <svg id="diagram-svg" width="2000" height="1500" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arr-end" markerWidth="10" markerHeight="7" refX="9" refY="3.5"
                  orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0 0,10 3.5,0 7" fill="#374151"/>
          </marker>
          <marker id="arr-start" markerWidth="10" markerHeight="7" refX="1" refY="3.5"
                  orient="auto-start-reverse" markerUnits="userSpaceOnUse">
            <polygon points="0 0,10 3.5,0 7" fill="#374151"/>
          </marker>
          <marker id="arr-end-sel" markerWidth="10" markerHeight="7" refX="9" refY="3.5"
                  orient="auto" markerUnits="userSpaceOnUse">
            <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
          </marker>
          <marker id="arr-start-sel" markerWidth="10" markerHeight="7" refX="1" refY="3.5"
                  orient="auto-start-reverse" markerUnits="userSpaceOnUse">
            <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
          </marker>
        </defs>
        <g id="freelines-layer"></g>
        <g id="connections-layer"></g>
        <g id="nodes-layer"></g>
        <line id="rubber-band" x1="0" y1="0" x2="0" y2="0" style="display:none"/>
      </svg>
    </div>
  </section>
</main>

<script>
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  nodes:       new Map(), // id → NodeData
  connections: new Map(), // id → ConnData
  freeLines:   new Map(), // id → FreeLineData
  nodeConns:   new Map(), // nodeId → Set<connId>
  selectedId:   null,
  selectedType: null,     // 'node' | 'connection' | 'freeline'
  connectMode:  false,
  connectSource: null,
  lineMode:    false,
  lineDrawing: false,
  lineStart:   null,
  connDirection: 'one-way',
  nextId: 1,
};

// NodeData: { id, type, x, y, w, h, title, description, notes[], trimLabel, maxChars }
// ConnData: { id, sourceId, targetId, direction, label, description }
// FreeLineData: { id, x1, y1, x2, y2 }

// ═══════════════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════════════
const svg         = document.getElementById('diagram-svg');
const nodesLayer  = document.getElementById('nodes-layer');
const connsLayer  = document.getElementById('connections-layer');
const flLayer     = document.getElementById('freelines-layer');
const rubberBand  = document.getElementById('rubber-band');
const wrapper     = document.getElementById('canvas-wrapper');
const placeholder = document.getElementById('panel-placeholder');
const editorForm  = document.getElementById('editor-form');
const btnDelete   = document.getElementById('btn-delete');
const btnConnect  = document.getElementById('btn-connect');
const btnLine     = document.getElementById('btn-line');

// ═══════════════════════════════════════════════════════════════
//  PALETTE DRAG → CREATE NODE
// ═══════════════════════════════════════════════════════════════
function paletteDragStart(e) {
  e.dataTransfer.setData('shape-type', e.currentTarget.dataset.shape);
  e.dataTransfer.effectAllowed = 'copy';
}
function canvasDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }
function canvasDrop(e) {
  e.preventDefault();
  const type = e.dataTransfer.getData('shape-type');
  if (!type) return;
  const pt = svgPt(e);
  createNode(type, pt.x, pt.y);
}

// ═══════════════════════════════════════════════════════════════
//  NODE CREATION
// ═══════════════════════════════════════════════════════════════
function createNode(type, x, y) {
  const id = 'n' + (state.nextId++);
  const w  = type === 'startend' ? 130 : 140;
  const h  = type === 'decision' ? 60  : 50;
  const node = { id, type, x, y, w, h, title: '', description: '', notes: [], trimLabel: true, maxChars: 16 };
  state.nodes.set(id, node);
  state.nodeConns.set(id, new Set());
  nodesLayer.appendChild(buildNodeSVG(node));
  selectElement(id, 'node');
}

function buildNodeSVG(node) {
  const { id, type, x, y, w, h } = node;
  const g = svgEl('g');
  g.setAttribute('class', 'node-group');
  g.setAttribute('data-node-id', id);
  g.setAttribute('transform', `translate(${x},${y})`);

  // Shape
  let shape;
  if (type === 'startend') {
    shape = svgEl('ellipse');
    shape.setAttribute('rx', w/2); shape.setAttribute('ry', h/2);
    shape.setAttribute('fill','#d1fae5'); shape.setAttribute('stroke','#059669');
    shape.setAttribute('class','node-shape startend-shape');
  } else if (type === 'process') {
    shape = svgEl('rect');
    shape.setAttribute('x',-w/2); shape.setAttribute('y',-h/2);
    shape.setAttribute('width',w); shape.setAttribute('height',h); shape.setAttribute('rx','6');
    shape.setAttribute('fill','#dbeafe'); shape.setAttribute('stroke','#2563eb');
    shape.setAttribute('class','node-shape process-shape');
  } else {
    shape = svgEl('polygon');
    shape.setAttribute('points',`0,${-h/2} ${w/2},0 0,${h/2} ${-w/2},0`);
    shape.setAttribute('fill','#fef3c7'); shape.setAttribute('stroke','#d97706');
    shape.setAttribute('class','node-shape decision-shape');
  }
  shape.setAttribute('stroke-width','2');
  g.appendChild(shape);

  // Label text
  g.appendChild(makeLabel(node));

  // Handles N S E W
  [['N',0,-h/2],['S',0,h/2],['E',w/2,0],['W',-w/2,0]].forEach(([dir,hx,hy]) => {
    const c = svgEl('circle');
    c.setAttribute('cx',hx); c.setAttribute('cy',hy); c.setAttribute('r','7');
    c.setAttribute('class','handle'); c.setAttribute('data-dir',dir);
    c.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); startConnect(id); });
    g.appendChild(c);
  });

  // Drag logic
  let drag = null;
  g.addEventListener('mousedown', e => {
    if (e.target.classList.contains('handle')) return;
    if (state.connectSource) { e.stopPropagation(); finishConnection(id); return; }
    if (state.lineMode) return;
    e.stopPropagation();
    selectElement(id, 'node');
    const pt = svgPt(e);
    const n = state.nodes.get(id);
    drag = { ox: pt.x - n.x, oy: pt.y - n.y };
    const move = ev => {
      if (!drag) return;
      const p = svgPt(ev);
      n.x = p.x - drag.ox; n.y = p.y - drag.oy;
      g.setAttribute('transform', `translate(${n.x},${n.y})`);
      rerouteConnections(id);
    };
    const up = () => { drag = null; document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });

  g.addEventListener('click', e => {
    if (state.connectSource && !e.target.classList.contains('handle')) {
      e.stopPropagation(); finishConnection(id);
    }
  });

  return g;
}

function makeLabel(node) {
  const lines = wrapText(node.title || typeLabel(node.type), node.maxChars || 16, !node.trimLabel);
  const txt = svgEl('text');
  txt.setAttribute('class', 'node-label');
  txt.setAttribute('data-label', '1');
  const lineH = 15;
  const startDy = -((lines.length - 1) * lineH) / 2;
  if (lines.length === 1) {
    txt.textContent = lines[0];
  } else {
    lines.forEach((line, i) => {
      const ts = svgEl('tspan');
      ts.setAttribute('x', '0');
      ts.setAttribute('dy', i === 0 ? `${startDy}` : `${lineH}`);
      ts.textContent = line;
      txt.appendChild(ts);
    });
  }
  return txt;
}

function wrapText(text, maxChars, noLimit) {
  if (!text) return [''];
  const mc = Math.max(4, maxChars || 16);
  const words = text.split(/\s+/).filter(Boolean);
  const lines = [];
  let cur = '';
  for (const word of words) {
    const test = cur ? cur + ' ' + word : word;
    if (test.length <= mc) {
      cur = test;
    } else {
      if (cur) lines.push(cur);
      cur = word.length > mc ? word.slice(0, mc - 1) + '…' : word;
      if (!noLimit && lines.length >= 1) { lines.push(cur); cur = ''; break; }
    }
  }
  if (cur) lines.push(cur);
  if (!noLimit && lines.length === 2 && lines[1].length > mc) lines[1] = lines[1].slice(0, mc-1) + '…';
  return lines.length ? lines : [''];
}

function typeLabel(type) {
  return type === 'startend' ? 'Start/End' : type === 'process' ? 'Process' : 'Decision';
}

function updateNodeLabel(id) {
  const node = state.nodes.get(id);
  const g = nodesLayer.querySelector(`[data-node-id="${id}"]`);
  if (!g) return;
  const old = g.querySelector('[data-label]');
  if (old) g.replaceChild(makeLabel(node), old);
}

// ═══════════════════════════════════════════════════════════════
//  NOTES IN DIAGRAM (sticky note cards)
// ═══════════════════════════════════════════════════════════════
function updateNodeNotes(nodeId) {
  const node = state.nodes.get(nodeId);
  const g    = nodesLayer.querySelector(`[data-node-id="${nodeId}"]`);
  if (!g) return;

  // Remove old note cards
  g.querySelectorAll('.note-card-group').forEach(el => el.remove());
  if (!node.notes || node.notes.length === 0) return;

  const noteW  = 130, noteH = 40, noteGap = 6;
  const noteX  = node.w / 2 + 18;   // left edge of cards (right of node)
  const foldSz = 11;
  const totalH = node.notes.length * noteH + (node.notes.length - 1) * noteGap;
  const startY = -(totalH / 2);

  node.notes.forEach((note, i) => {
    const ny     = startY + i * (noteH + noteGap);
    const midY   = ny + noteH / 2;
    const ng     = svgEl('g');
    ng.setAttribute('class', 'note-card-group');

    // Stem line: from node right edge (w/2, 0) to card left edge center
    const stem = svgEl('line');
    stem.setAttribute('x1', node.w / 2); stem.setAttribute('y1', '0');
    stem.setAttribute('x2', noteX);      stem.setAttribute('y2', String(midY));
    stem.setAttribute('class', 'note-card-stem');
    ng.appendChild(stem);

    // Card background
    const rect = svgEl('rect');
    rect.setAttribute('x', noteX);     rect.setAttribute('y', String(ny));
    rect.setAttribute('width', noteW); rect.setAttribute('height', noteH);
    rect.setAttribute('rx', '3');
    rect.setAttribute('class', 'note-card-rect');
    ng.appendChild(rect);

    // Folded corner (top-right)
    const fold = svgEl('polygon');
    const fx = noteX + noteW - foldSz;
    fold.setAttribute('points', `${fx},${ny} ${noteX+noteW},${ny+foldSz} ${fx},${ny+foldSz}`);
    fold.setAttribute('class', 'note-card-fold');
    ng.appendChild(fold);

    // Badge "#N"
    const badge = svgEl('text');
    badge.setAttribute('x', String(noteX + 5));
    badge.setAttribute('y', String(ny + 13));
    badge.setAttribute('class', 'note-card-num');
    badge.textContent = `#${i + 1}`;
    ng.appendChild(badge);

    // Line 1 of note text
    const raw   = (note || '').trim() || '(empty)';
    const line1 = raw.length > 17 ? raw.slice(0, 16) + '…' : raw;
    const t1 = svgEl('text');
    t1.setAttribute('x', String(noteX + 24));
    t1.setAttribute('y', String(ny + 13));
    t1.setAttribute('class', 'note-card-text');
    t1.textContent = line1;
    ng.appendChild(t1);

    // Line 2 (continuation if note is long enough)
    if (raw.length > 16) {
      const raw2 = raw.slice(16);
      const line2 = raw2.length > 19 ? raw2.slice(0, 18) + '…' : raw2;
      const t2 = svgEl('text');
      t2.setAttribute('x', String(noteX + 5));
      t2.setAttribute('y', String(ny + 27));
      t2.setAttribute('class', 'note-card-text2');
      t2.textContent = line2;
      ng.appendChild(t2);
    }

    g.appendChild(ng);
  });
}

// ═══════════════════════════════════════════════════════════════
//  CONNECTION DRAWING  (rubber band follows mouse via SVG mousemove)
// ═══════════════════════════════════════════════════════════════
function startConnect(nodeId) {
  exitLineMode();
  state.connectMode   = true;
  state.connectSource = nodeId;
  btnConnect.classList.add('active');
  wrapper.classList.add('connect-mode');
  const n = state.nodes.get(nodeId);
  rubberBand.setAttribute('x1', n.x); rubberBand.setAttribute('y1', n.y);
  rubberBand.setAttribute('x2', n.x); rubberBand.setAttribute('y2', n.y);
  rubberBand.style.display = '';
}

function toggleConnectMode() {
  if (state.connectMode) exitConnectMode();
  else {
    exitLineMode();
    state.connectMode = true;
    btnConnect.classList.add('active');
    wrapper.classList.add('connect-mode');
    // Rubber band stays hidden until user clicks a handle
  }
}
function exitConnectMode() {
  state.connectMode = false; state.connectSource = null;
  rubberBand.style.display = 'none';
  btnConnect.classList.remove('active');
  wrapper.classList.remove('connect-mode');
}

function finishConnection(targetId) {
  rubberBand.style.display = 'none';
  const src = state.connectSource;
  exitConnectMode();
  if (!src || src === targetId) return;

  const id   = 'c' + (state.nextId++);
  const conn = { id, sourceId: src, targetId, direction: state.connDirection, label: '', description: '' };
  state.connections.set(id, conn);
  state.nodeConns.get(src).add(id);
  state.nodeConns.get(targetId).add(id);
  connsLayer.appendChild(buildConnSVG(conn));
  selectElement(id, 'connection');
}

function buildConnSVG(conn) {
  const { id } = conn;
  const g = svgEl('g');
  g.setAttribute('class', 'conn-group');
  g.setAttribute('data-conn-id', id);

  const path = svgEl('path'); path.setAttribute('class', 'conn-path'); g.appendChild(path);
  const hit  = svgEl('path'); hit.setAttribute('class', 'conn-hit');   g.appendChild(hit);

  const bg = svgEl('rect'); bg.setAttribute('class','conn-label-bg'); bg.setAttribute('rx','3'); bg.setAttribute('height','16'); g.appendChild(bg);
  const lbl = svgEl('text'); lbl.setAttribute('class','conn-label'); g.appendChild(lbl);

  g.addEventListener('click', e => { e.stopPropagation(); selectElement(id, 'connection'); });
  routeConn(conn, g);
  return g;
}

function routeConn(conn, g) {
  const src = state.nodes.get(conn.sourceId);
  const tgt = state.nodes.get(conn.targetId);
  if (!src || !tgt) return;

  const { x: x1, y: y1 } = edgePt(src, tgt);
  const { x: x2, y: y2 } = edgePt(tgt, src);
  const d = `M ${x1},${y1} L ${x2},${y2}`;

  const isSel = g.classList.contains('selected');
  const path = g.querySelector('.conn-path');
  const hit  = g.querySelector('.conn-hit');
  path.setAttribute('d', d); hit.setAttribute('d', d);
  path.setAttribute('marker-end', isSel ? 'url(#arr-end-sel)' : 'url(#arr-end)');
  if (conn.direction === 'two-way')
    path.setAttribute('marker-start', isSel ? 'url(#arr-start-sel)' : 'url(#arr-start)');
  else
    path.removeAttribute('marker-start');

  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const lbl = g.querySelector('.conn-label');
  const bg  = g.querySelector('.conn-label-bg');
  lbl.setAttribute('x', mx); lbl.setAttribute('y', my);
  lbl.textContent = conn.label || '';
  if (conn.label) {
    const w2 = conn.label.length * 6.5 + 8;
    bg.setAttribute('x', mx - w2/2); bg.setAttribute('y', my - 9);
    bg.setAttribute('width', w2); bg.style.display = '';
  } else { bg.style.display = 'none'; }
}

function edgePt(from, to) {
  const dx = to.x - from.x, dy = to.y - from.y;
  const angle = Math.atan2(dy, dx);
  const hw = from.w/2, hh = from.h/2;
  const cosA = Math.cos(angle), sinA = Math.sin(angle);
  if (Math.abs(cosA) * hh > Math.abs(sinA) * hw) {
    const ex = from.x + Math.sign(cosA) * hw;
    const ey = from.y + Math.sign(cosA) * hw * Math.tan(angle);
    return { x: ex, y: ey };
  } else {
    const ey = from.y + Math.sign(sinA) * hh;
    const ex = from.x + (Math.abs(sinA) > 0.001 ? Math.sign(sinA) * hh / Math.tan(angle) : 0);
    return { x: ex, y: ey };
  }
}

function rerouteConnections(nodeId) {
  (state.nodeConns.get(nodeId) || new Set()).forEach(cid => {
    const conn = state.connections.get(cid);
    const g = connsLayer.querySelector(`[data-conn-id="${cid}"]`);
    if (conn && g) routeConn(conn, g);
  });
}

// ═══════════════════════════════════════════════════════════════
//  FREE LINE DRAWING
// ═══════════════════════════════════════════════════════════════
function toggleLineMode() {
  if (state.lineMode) exitLineMode();
  else {
    exitConnectMode();
    state.lineMode = true;
    btnLine.classList.add('active');
    wrapper.classList.add('line-mode');
  }
}
function exitLineMode() {
  state.lineMode = false; state.lineDrawing = false; state.lineStart = null;
  rubberBand.style.display = 'none';
  btnLine.classList.remove('active');
  wrapper.classList.remove('line-mode');
}

function createFreeLine(x1, y1, x2, y2) {
  const id = 'fl' + (state.nextId++);
  const fl = { id, x1, y1, x2, y2 };
  state.freeLines.set(id, fl);
  flLayer.appendChild(buildFLSVG(fl));
  selectElement(id, 'freeline');
}

function buildFLSVG(fl) {
  const { id, x1, y1, x2, y2 } = fl;
  const g = svgEl('g');
  g.setAttribute('class', 'fl-group');
  g.setAttribute('data-fl-id', id);

  const path = svgEl('line');
  path.setAttribute('class', 'fl-path');
  path.setAttribute('x1',x1); path.setAttribute('y1',y1);
  path.setAttribute('x2',x2); path.setAttribute('y2',y2);
  g.appendChild(path);

  const hit = svgEl('line');
  hit.setAttribute('class','fl-hit');
  hit.setAttribute('x1',x1); hit.setAttribute('y1',y1);
  hit.setAttribute('x2',x2); hit.setAttribute('y2',y2);
  g.appendChild(hit);

  g.addEventListener('click', e => { e.stopPropagation(); selectElement(id, 'freeline'); });
  return g;
}

// ═══════════════════════════════════════════════════════════════
//  SVG MOUSE EVENTS (rubber band + free-line draw)
// ═══════════════════════════════════════════════════════════════
svg.addEventListener('mousemove', e => {
  if (state.connectSource !== null || state.lineDrawing) {
    const pt = svgPt(e);
    rubberBand.setAttribute('x2', pt.x);
    rubberBand.setAttribute('y2', pt.y);
  }
});

svg.addEventListener('mousedown', e => {
  if (!state.lineMode) return;
  if (e.target !== svg && e.target.closest('.node-group, .conn-group, .fl-group')) return;
  e.stopPropagation();
  const pt = svgPt(e);
  state.lineDrawing = true;
  state.lineStart = pt;
  rubberBand.setAttribute('stroke-dasharray', 'none');
  rubberBand.setAttribute('stroke', '#6b7280');
  rubberBand.setAttribute('x1', pt.x); rubberBand.setAttribute('y1', pt.y);
  rubberBand.setAttribute('x2', pt.x); rubberBand.setAttribute('y2', pt.y);
  rubberBand.style.display = '';
});

svg.addEventListener('mouseup', e => {
  if (!state.lineDrawing || !state.lineStart) return;
  const pt = svgPt(e);
  const dx = pt.x - state.lineStart.x, dy = pt.y - state.lineStart.y;
  rubberBand.style.display = 'none';
  rubberBand.setAttribute('stroke-dasharray', '6 4');
  rubberBand.setAttribute('stroke', '#3b82f6');
  if (Math.sqrt(dx*dx + dy*dy) > 8)
    createFreeLine(state.lineStart.x, state.lineStart.y, pt.x, pt.y);
  state.lineDrawing = false; state.lineStart = null;
});

svg.addEventListener('click', e => {
  if (e.target === svg || e.target === svg.querySelector('defs')) return;
  const inNode = e.target.closest('.node-group');
  const inConn = e.target.closest('.conn-group');
  const inFL   = e.target.closest('.fl-group');
  if (!inNode && !inConn && !inFL && !state.lineMode) {
    if (state.connectSource) { exitConnectMode(); return; }
    clearSelection();
  }
});

// ═══════════════════════════════════════════════════════════════
//  DIRECTION TOGGLE
// ═══════════════════════════════════════════════════════════════
function setDirection(dir) {
  state.connDirection = dir;
  document.getElementById('btn-oneway').classList.toggle('active', dir==='one-way');
  document.getElementById('btn-twoway').classList.toggle('active', dir==='two-way');
}

// ═══════════════════════════════════════════════════════════════
//  SELECTION
// ═══════════════════════════════════════════════════════════════
function selectElement(id, type) {
  clearSelection();
  state.selectedId   = id;
  state.selectedType = type;
  btnDelete.disabled = false;

  if (type === 'node') {
    nodesLayer.querySelector(`[data-node-id="${id}"]`)?.classList.add('selected');
    populateNodeEditor(id);
  } else if (type === 'connection') {
    const g = connsLayer.querySelector(`[data-conn-id="${id}"]`);
    if (g) {
      g.classList.add('selected');
      const conn = state.connections.get(id);
      const p = g.querySelector('.conn-path');
      if (p) {
        p.setAttribute('marker-end','url(#arr-end-sel)');
        if (conn?.direction==='two-way') p.setAttribute('marker-start','url(#arr-start-sel)');
      }
    }
    populateConnEditor(id);
  } else {
    flLayer.querySelector(`[data-fl-id="${id}"]`)?.classList.add('selected');
    populateFLEditor(id);
  }
}

function clearSelection() {
  const id = state.selectedId, type = state.selectedType;
  state.selectedId = null; state.selectedType = null;
  btnDelete.disabled = true;
  placeholder.style.display = '';
  editorForm.style.display  = 'none';

  if (id) {
    if (type === 'node') {
      nodesLayer.querySelector(`[data-node-id="${id}"]`)?.classList.remove('selected');
    } else if (type === 'connection') {
      const g = connsLayer.querySelector(`[data-conn-id="${id}"]`);
      if (g) {
        g.classList.remove('selected');
        const conn = state.connections.get(id);
        const p = g.querySelector('.conn-path');
        if (p && conn) {
          p.setAttribute('marker-end','url(#arr-end)');
          if (conn.direction==='two-way') p.setAttribute('marker-start','url(#arr-start)');
          else p.removeAttribute('marker-start');
        }
      }
    } else {
      flLayer.querySelector(`[data-fl-id="${id}"]`)?.classList.remove('selected');
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  LEFT PANEL EDITORS
// ═══════════════════════════════════════════════════════════════
function populateNodeEditor(id) {
  const node = state.nodes.get(id);
  showEditor();
  document.getElementById('conn-label-group').style.display  = 'none';
  document.getElementById('node-title-group').style.display  = '';
  document.getElementById('notes-section').style.display     = '';
  document.getElementById('btn-add-note').style.display      = '';

  const chip = document.getElementById('editor-type-chip');
  chip.className = 'chip-type ' + node.type;
  chip.textContent = typeLabel(node.type);

  document.getElementById('editor-title').value = node.title;
  document.getElementById('chk-trim').checked   = node.trimLabel !== false;
  document.getElementById('inp-maxchars').value  = node.maxChars || 16;
  document.getElementById('editor-desc').value   = node.description;
  renderNotesList(id);
}

function populateConnEditor(id) {
  const conn = state.connections.get(id);
  showEditor();
  document.getElementById('conn-label-group').style.display  = '';
  document.getElementById('node-title-group').style.display  = 'none';
  document.getElementById('notes-section').style.display     = 'none';

  const chip = document.getElementById('editor-type-chip');
  chip.className = 'chip-type connector';
  const sn = state.nodes.get(conn.sourceId)?.title || conn.sourceId;
  const tn = state.nodes.get(conn.targetId)?.title || conn.targetId;
  chip.textContent = `${sn} → ${tn} (${conn.direction})`;

  document.getElementById('editor-conn-label').value = conn.label;
  document.getElementById('editor-desc').value       = conn.description;
}

function populateFLEditor(id) {
  showEditor();
  document.getElementById('conn-label-group').style.display  = 'none';
  document.getElementById('node-title-group').style.display  = 'none';
  document.getElementById('notes-section').style.display     = 'none';
  document.getElementById('editor-desc').value = '';

  const chip = document.getElementById('editor-type-chip');
  chip.className = 'chip-type freeline';
  chip.textContent = 'Free Line';
}

function showEditor() {
  placeholder.style.display = 'none';
  editorForm.style.display  = '';
}

// ═══════════════════════════════════════════════════════════════
//  SYNC FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function syncTitle() {
  if (state.selectedType !== 'node') return;
  state.nodes.get(state.selectedId).title = document.getElementById('editor-title').value;
  updateNodeLabel(state.selectedId);
}
function syncTrimLabel() {
  if (state.selectedType !== 'node') return;
  const node = state.nodes.get(state.selectedId);
  node.trimLabel = document.getElementById('chk-trim').checked;
  updateNodeLabel(state.selectedId);
}
function syncMaxChars() {
  if (state.selectedType !== 'node') return;
  const node = state.nodes.get(state.selectedId);
  node.maxChars = parseInt(document.getElementById('inp-maxchars').value) || 16;
  updateNodeLabel(state.selectedId);
}
function syncConnLabel() {
  if (state.selectedType !== 'connection') return;
  const conn = state.connections.get(state.selectedId);
  conn.label = document.getElementById('editor-conn-label').value;
  const g = connsLayer.querySelector(`[data-conn-id="${state.selectedId}"]`);
  if (g) routeConn(conn, g);
}
function syncDesc() {
  if (!state.selectedId) return;
  if (state.selectedType === 'node')
    state.nodes.get(state.selectedId).description = document.getElementById('editor-desc').value;
  else if (state.selectedType === 'connection')
    state.connections.get(state.selectedId).description = document.getElementById('editor-desc').value;
}

// ═══════════════════════════════════════════════════════════════
//  NOTES
// ═══════════════════════════════════════════════════════════════
function addNote() {
  if (state.selectedType !== 'node') return;
  const node = state.nodes.get(state.selectedId);
  node.notes.push('');
  renderNotesList(state.selectedId);
  updateNodeNotes(state.selectedId);
}

function renderNotesList(nodeId) {
  const node = state.nodes.get(nodeId);
  const list = document.getElementById('notes-list');
  const cnt  = document.getElementById('notes-count');
  cnt.textContent = node.notes.length ? `(${node.notes.length})` : '';
  list.innerHTML = '';
  node.notes.forEach((note, i) => {
    const div = document.createElement('div');
    div.className = 'note-item';
    div.innerHTML = `
      <div class="note-item-hdr">
        <span>Note ${i+1}</span>
        <button class="btn-sm del" onclick="deleteNote('${nodeId}',${i})">Remove</button>
      </div>
      <textarea placeholder="Write a note…" oninput="updateNote('${nodeId}',${i},this.value)">${escHtml(note)}</textarea>`;
    list.appendChild(div);
  });
}

function updateNote(nodeId, idx, val) {
  const node = state.nodes.get(nodeId);
  if (!node) return;
  node.notes[idx] = val;
  updateNodeNotes(nodeId);
}

function deleteNote(nodeId, idx) {
  const node = state.nodes.get(nodeId);
  if (!node) return;
  node.notes.splice(idx, 1);
  renderNotesList(nodeId);
  updateNodeNotes(nodeId);
}

// ═══════════════════════════════════════════════════════════════
//  DELETE
// ═══════════════════════════════════════════════════════════════
function deleteSelected() {
  if (!state.selectedId) return;
  const id = state.selectedId, type = state.selectedType;
  clearSelection();

  if (type === 'node') {
    [...(state.nodeConns.get(id)||[])].forEach(cid => {
      const c = state.connections.get(cid);
      if (c) {
        const other = c.sourceId === id ? c.targetId : c.sourceId;
        state.nodeConns.get(other)?.delete(cid);
      }
      state.connections.delete(cid);
      connsLayer.querySelector(`[data-conn-id="${cid}"]`)?.remove();
    });
    state.nodes.delete(id); state.nodeConns.delete(id);
    nodesLayer.querySelector(`[data-node-id="${id}"]`)?.remove();
  } else if (type === 'connection') {
    const c = state.connections.get(id);
    if (c) {
      state.nodeConns.get(c.sourceId)?.delete(id);
      state.nodeConns.get(c.targetId)?.delete(id);
    }
    state.connections.delete(id);
    connsLayer.querySelector(`[data-conn-id="${id}"]`)?.remove();
  } else {
    state.freeLines.delete(id);
    flLayer.querySelector(`[data-fl-id="${id}"]`)?.remove();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { exitConnectMode(); exitLineMode(); return; }
  if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedId) {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    deleteSelected();
  }
});

// ═══════════════════════════════════════════════════════════════
//  CLEAR ALL
// ═══════════════════════════════════════════════════════════════
function clearAll() {
  if (state.nodes.size === 0 && state.connections.size === 0 && state.freeLines.size === 0) return;
  if (!confirm('Clear entire diagram? This cannot be undone.')) return;
  clearSelection();
  state.nodes.clear(); state.connections.clear(); state.freeLines.clear(); state.nodeConns.clear();
  nodesLayer.innerHTML = ''; connsLayer.innerHTML = ''; flLayer.innerHTML = '';
}

// ═══════════════════════════════════════════════════════════════
//  MARKDOWN EXPORT
// ═══════════════════════════════════════════════════════════════
function getMermaidSyntax() {
  const lines = ['flowchart TD'];
  state.nodes.forEach(n => {
    const t = (n.title || typeLabel(n.type)).replace(/"/g,"'");
    if (n.type === 'startend')     lines.push(`  ${n.id}([${t}])`);
    else if (n.type === 'process') lines.push(`  ${n.id}[${t}]`);
    else                           lines.push(`  ${n.id}{${t}}`);
  });
  state.connections.forEach(c => {
    const arr = c.direction === 'two-way' ? '<-->' : '-->';
    const lbl = c.label ? `|${c.label}|` : '';
    lines.push(`  ${c.sourceId} ${arr}${lbl} ${c.targetId}`);
  });
  return lines.join('\n');
}

function exportMarkdown() {
  if (state.nodes.size === 0) { alert('No nodes to export.'); return; }
  let md = '# Workflow Diagram\n\n## Diagram\n\n```mermaid\n' + getMermaidSyntax() + '\n```\n\n';

  md += '## Node Details\n\n';
  state.nodes.forEach(n => {
    md += `### ${n.title || typeLabel(n.type)} (${n.type})\n\n`;
    if (n.description) md += `${n.description}\n\n`;
    if (n.notes?.length) {
      md += '**Notes:**\n\n';
      n.notes.forEach(note => { if (note.trim()) md += `- ${note}\n`; });
      md += '\n';
    }
  });

  if (state.connections.size > 0) {
    md += '## Connector Details\n\n';
    state.connections.forEach(c => {
      const sn = state.nodes.get(c.sourceId)?.title || c.sourceId;
      const tn = state.nodes.get(c.targetId)?.title || c.targetId;
      const arr = c.direction === 'two-way' ? '↔' : '→';
      md += `### ${sn} ${arr} ${tn}\n\n`;
      if (c.label) md += `**Label:** ${c.label}\n\n`;
      if (c.description) md += `${c.description}\n\n`;
    });
  }

  dlBlob(new Blob([md], { type: 'text/markdown' }), 'diagram.md');
}

// ═══════════════════════════════════════════════════════════════
//  PNG EXPORT
// ═══════════════════════════════════════════════════════════════
function exportPNG() {
  if (state.nodes.size === 0) { alert('No nodes to export.'); return; }
  const prevId   = state.selectedId;
  const prevType = state.selectedType;
  if (prevId) clearSelection();

  const b   = contentBounds();
  const pad = 40;
  const vx  = b.minX - pad, vy = b.minY - pad;
  const vw  = b.maxX - b.minX + pad*2;
  const vh  = b.maxY - b.minY + pad*2;

  const clone = svg.cloneNode(true);
  clone.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
  clone.setAttribute('width',  vw);
  clone.setAttribute('height', vh);
  clone.removeAttribute('style');

  inlineStyles(svg, clone);

  const styleEl = document.createElementNS('http://www.w3.org/2000/svg','style');
  styleEl.textContent = 'text,tspan{font-family:Arial,Helvetica,sans-serif;}';
  clone.insertBefore(styleEl, clone.firstChild);

  const svgStr = new XMLSerializer().serializeToString(clone);
  const blobUrl = URL.createObjectURL(new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' }));

  const scale = 2;
  const canvas = document.createElement('canvas');
  canvas.width = vw * scale; canvas.height = vh * scale;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(blobUrl);
    canvas.toBlob(b2 => {
      dlBlob(b2, 'diagram.png');
      if (prevId) selectElement(prevId, prevType);
    });
  };
  img.onerror = () => { URL.revokeObjectURL(blobUrl); alert('PNG export failed. Try Chrome or Edge.'); };
  img.src = blobUrl;
}

function contentBounds() {
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  state.nodes.forEach(n => {
    // include note cards in bounds
    const notesW = n.notes?.length ? 18 + 130 : 0;
    minX = Math.min(minX, n.x - n.w/2);
    minY = Math.min(minY, n.y - n.h/2);
    maxX = Math.max(maxX, n.x + n.w/2 + notesW);
    maxY = Math.max(maxY, n.y + n.h/2);
  });
  state.freeLines.forEach(fl => {
    minX = Math.min(minX, fl.x1, fl.x2);
    minY = Math.min(minY, fl.y1, fl.y2);
    maxX = Math.max(maxX, fl.x1, fl.x2);
    maxY = Math.max(maxY, fl.y1, fl.y2);
  });
  return { minX, minY, maxX, maxY };
}

function inlineStyles(srcSvg, destSvg) {
  const se = srcSvg.querySelectorAll('*');
  const de = destSvg.querySelectorAll('*');
  const props = ['fill','stroke','stroke-width','stroke-dasharray','font-size','font-weight',
                 'font-family','opacity','display','text-anchor','dominant-baseline'];
  se.forEach((el, i) => {
    const dest = de[i]; if (!dest) return;
    const cs = getComputedStyle(el);
    props.forEach(p => {
      const v = cs.getPropertyValue(p);
      if (v && v !== '' && v !== 'none') {
        const js = p.replace(/-([a-z])/g, (_,c) => c.toUpperCase());
        try { dest.style[js] = v; } catch(e) {}
      }
    });
    ['fill','stroke','stroke-width','opacity','display','marker-end','marker-start'].forEach(a => {
      if (el.hasAttribute(a)) dest.setAttribute(a, el.getAttribute(a));
    });
  });
}

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function svgPt(e) {
  const r = svg.getBoundingClientRect();
  return { x: e.clientX - r.left + wrapper.scrollLeft, y: e.clientY - r.top + wrapper.scrollTop };
}

function svgEl(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }

function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

function dlBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════
//  IMPORT .md
// ═══════════════════════════════════════════════════════════════
function triggerImport() {
  document.getElementById('file-input').value = '';
  document.getElementById('file-input').click();
}

function importMarkdown(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      loadFromMD(e.target.result);
    } catch(err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function loadFromMD(text) {
  // ── 1. Extract mermaid block ──────────────────────────────────
  const mermaidMatch = text.match(/```mermaid\s*([\s\S]*?)```/i);
  if (!mermaidMatch) throw new Error('No mermaid block found in file.');
  const mermaidText = mermaidMatch[1].trim();

  // ── 2. Parse mermaid ─────────────────────────────────────────
  const parsedNodes = new Map(); // id → { id, type, label }
  const parsedConns = [];        // { srcId, tgtId, direction, label }

  for (const rawLine of mermaidText.split('\n')) {
    const line = rawLine.trim();
    if (!line || line.startsWith('flowchart') || line.startsWith('graph')) continue;

    // Connection patterns: id1 --> id2, id1 <--> id2, id1 -->|lbl| id2
    const connRe = /^([\w]+)\s*(<?)--(?:\|([^|]*)\|)?-?(?:>)\s*([\w]+)/;
    const cm = line.match(connRe);
    if (cm) {
      const direction = cm[2] === '<' ? 'two-way' : 'one-way';
      parsedConns.push({ srcId: cm[1], tgtId: cm[4], direction, label: (cm[3] || '').trim() });
      continue;
    }

    // Node definition patterns
    // startend: id([label]) or id([label])
    // process:  id[label]
    // decision: id{label}
    const nodeRe = /^([\w]+)\s*([\(\[\{].*[\)\]\}])\s*$/;
    const nm = line.match(nodeRe);
    if (nm) {
      const id  = nm[1];
      const def = nm[2];
      let type = 'process', label = '';
      if (/^\(\[/.test(def))      { type = 'startend'; label = def.slice(2, -2); }
      else if (/^\[/.test(def))   { type = 'process';  label = def.slice(1, -1); }
      else if (/^\{/.test(def))   { type = 'decision'; label = def.slice(1, -1); }
      else if (/^\(\(/.test(def)) { type = 'process';  label = def.slice(2, -2); }
      else if (/^\(/.test(def))   { type = 'startend'; label = def.slice(1, -1); }
      if (!parsedNodes.has(id)) parsedNodes.set(id, { id, type, label: label.trim() });
      continue;
    }

    // Bare node id (no shape) — treat as process
    const bareRe = /^([\w]+)$/;
    const bm = line.match(bareRe);
    if (bm && !parsedNodes.has(bm[1]))
      parsedNodes.set(bm[1], { id: bm[1], type: 'process', label: bm[1] });
  }

  // Ensure all nodes referenced by connections exist
  parsedConns.forEach(c => {
    if (!parsedNodes.has(c.srcId)) parsedNodes.set(c.srcId, { id: c.srcId, type: 'process', label: c.srcId });
    if (!parsedNodes.has(c.tgtId)) parsedNodes.set(c.tgtId, { id: c.tgtId, type: 'process', label: c.tgtId });
  });

  if (parsedNodes.size === 0) throw new Error('No nodes found in mermaid block.');

  // ── 3. Parse node details section ────────────────────────────
  const nodeDetails = new Map(); // label → { description, notes[] }
  const connDetails = new Map(); // "src → tgt" → { label, description }

  // Split full text into lines and scan for ## Node Details section
  const allLines = text.split('\n');
  let inNodeDetails = false, inNotesList = false;
  let curLabel = null, curDescLines = [], curNotes = [];

  function flushNode() {
    if (!curLabel) return;
    nodeDetails.set(curLabel, {
      description: curDescLines.join('\n').trim(),
      notes: curNotes.slice()
    });
    if (curNotes.length) console.log('[import] notes for', curLabel, ':', curNotes);
    curLabel = null; curDescLines = []; curNotes = []; inNotesList = false;
  }

  for (const rawLine of allLines) {
    const line = rawLine.trimEnd();
    if (/^## Node Details/i.test(line))  { inNodeDetails = true; continue; }
    if (/^## /i.test(line) && inNodeDetails) { flushNode(); inNodeDetails = false; continue; }
    if (!inNodeDetails) continue;

    if (/^### /.test(line)) {
      flushNode();
      const hdr = line.replace(/^### /, '').trim();
      curLabel = hdr.replace(/\s*\([^)]*\)\s*$/, '').trim();
      inNotesList = false;
      continue;
    }
    if (!curLabel) continue;

    if (/^\*\*Notes:\*\*\s*$/i.test(line.trim())) { inNotesList = true; continue; }

    if (inNotesList) {
      const noteLine = line.trim();
      if (noteLine.startsWith('- ')) {
        curNotes.push(noteLine.slice(2).trim());
      } else if (noteLine.startsWith('-') && noteLine.length > 1) {
        curNotes.push(noteLine.slice(1).trim());
      } else if (noteLine && !noteLine.startsWith('**')) {
        // continuation of last note or plain bullet without dash
        if (curNotes.length) curNotes[curNotes.length - 1] += ' ' + noteLine;
        else curNotes.push(noteLine);
      }
    } else {
      curDescLines.push(line);
    }
  }
  flushNode();

  const connMatch2 = text.match(/## Connector Details\s*([\s\S]*?)(?=## |$)/i);
  if (connMatch2) {
    const cblocks = connMatch2[1].split(/^###\s+/m).slice(1);
    cblocks.forEach(block => {
      const headerLine = block.split('\n')[0].trim();
      const rest = block.slice(headerLine.length).trim();
      const lblMatch = rest.match(/\*\*Label:\*\*\s*(.+)/i);
      const connLbl  = lblMatch ? lblMatch[1].trim() : '';
      const descTxt  = rest.replace(/\*\*Label:\*\*[^\n]*/i,'').trim();
      connDetails.set(headerLine, { label: connLbl, description: descTxt });
    });
  }

  // ── 4. Auto-layout ────────────────────────────────────────────
  const positions = autoLayout(parsedNodes, parsedConns);

  // ── 5. Clear existing and rebuild ────────────────────────────
  clearSelection();
  state.nodes.clear(); state.connections.clear(); state.freeLines.clear(); state.nodeConns.clear();
  nodesLayer.innerHTML = ''; connsLayer.innerHTML = ''; flLayer.innerHTML = '';

  // Reset nextId so imported IDs don't conflict with future additions
  let maxNumId = 0;

  parsedNodes.forEach(pn => {
    const numPart = parseInt(pn.id.replace(/\D/g,''));
    if (!isNaN(numPart) && numPart > maxNumId) maxNumId = numPart;

    const pos  = positions.get(pn.id) || { x: 200, y: 200 };
    const w    = pn.type === 'startend' ? 130 : 140;
    const h    = pn.type === 'decision' ? 60  : 50;
    const det  = nodeDetails.get(pn.label) || {};
    const node = {
      id: pn.id, type: pn.type, x: pos.x, y: pos.y, w, h,
      title: pn.label, description: det.description || '', notes: det.notes || [],
      trimLabel: true, maxChars: 16
    };
    state.nodes.set(pn.id, node);
    state.nodeConns.set(pn.id, new Set());
    const g = buildNodeSVG(node);
    nodesLayer.appendChild(g);
    if (node.notes.length) updateNodeNotes(pn.id);
  });

  parsedConns.forEach((pc, i) => {
    const id   = pc.srcId + '_' + pc.tgtId + '_' + i;
    const det  = (() => {
      const sn = parsedNodes.get(pc.srcId)?.label || pc.srcId;
      const tn = parsedNodes.get(pc.tgtId)?.label || pc.tgtId;
      const arr = pc.direction === 'two-way' ? '↔' : '→';
      return connDetails.get(`${sn} ${arr} ${tn}`) || {};
    })();
    const conn = {
      id, sourceId: pc.srcId, targetId: pc.tgtId,
      direction: pc.direction, label: pc.label || det.label || '',
      description: det.description || ''
    };
    state.connections.set(id, conn);
    state.nodeConns.get(pc.srcId)?.add(id);
    state.nodeConns.get(pc.tgtId)?.add(id);
    connsLayer.appendChild(buildConnSVG(conn));
  });

  state.nextId = maxNumId + 100;

  // Select the first node that has notes (so notes are visible in left panel immediately),
  // falling back to the first node if none have notes.
  let selectId = null;
  for (const [id, node] of state.nodes) {
    if (!selectId) selectId = id;
    if (node.notes && node.notes.length > 0) { selectId = id; break; }
  }
  if (selectId) selectElement(selectId, 'node');

  // Show import summary
  const totalNotes = [...state.nodes.values()].reduce((s, n) => s + (n.notes?.length || 0), 0);
  showToast(`Imported ${state.nodes.size} node${state.nodes.size !== 1 ? 's' : ''}, ${state.connections.size} connection${state.connections.size !== 1 ? 's' : ''}${totalNotes ? ', ' + totalNotes + ' note' + (totalNotes !== 1 ? 's' : '') : ''}.`);

  // Scroll to content
  wrapper.scrollTo(0, 0);
}

function autoLayout(nodes, conns) {
  const inDeg = new Map();
  const adj   = new Map();
  nodes.forEach(n => { inDeg.set(n.id, 0); adj.set(n.id, []); });
  conns.forEach(c => {
    inDeg.set(c.tgtId, (inDeg.get(c.tgtId) || 0) + 1);
    adj.get(c.srcId)?.push(c.tgtId);
  });

  // Kahn's BFS for topological levels
  const levels = [];
  let queue = [...nodes.values()].filter(n => (inDeg.get(n.id) || 0) === 0).map(n => n.id);
  const visited = new Set(queue);
  while (queue.length) {
    levels.push([...queue]);
    const next = [];
    queue.forEach(id => {
      (adj.get(id) || []).forEach(tid => {
        if (!visited.has(tid)) { visited.add(tid); next.push(tid); }
      });
    });
    queue = next;
  }
  // Catch any unvisited (cycles)
  nodes.forEach(n => { if (!visited.has(n.id)) levels.push([n.id]); });

  const positions = new Map();
  const levelH = 140, nodeSpacing = 200;
  const svgCenterX = 600;
  levels.forEach((level, li) => {
    const totalW = (level.length - 1) * nodeSpacing;
    const startX = svgCenterX - totalW / 2;
    level.forEach((id, xi) => {
      positions.set(id, { x: startX + xi * nodeSpacing, y: 80 + li * levelH });
    });
  });
  return positions;
}
