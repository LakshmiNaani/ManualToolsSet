<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock</title>
  <style>
    :root {
      --bg:           #f8fafc;
      --surface:      #ffffff;
      --border:       #e2e8f0;
      --accent:       #3b82f6;
      --accent-light: #eff6ff;
      --accent-border:#bfdbfe;
      --text:         #1e293b;
      --muted:        #64748b;
      --danger:       #ef4444;
      --danger-light: #fef2f2;
      --success:      #16a34a;
      --font:         system-ui, -apple-system, 'Segoe UI', sans-serif;
      --mono:         'Cascadia Code', 'Fira Code', 'Monaco', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); color: var(--text); background: var(--bg); }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 20;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }

    /* mode toggle */
    .mode-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .mode-btn {
      padding: 5px 14px;
      font-size: 12px; font-weight: 600;
      background: none; border: none; cursor: pointer;
      color: var(--muted);
      transition: background 0.12s, color 0.12s;
    }
    .mode-btn.active { background: var(--accent); color: #fff; }

    .header-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: none; border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
      font-size: 15px; color: var(--muted);
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .icon-btn:hover { background: var(--bg); color: var(--text); border-color: #cbd5e1; }

    /* ── Lookup Bar ── */
    #lookup-bar {
      background: var(--accent-light);
      border-bottom: 1px solid var(--accent-border);
      padding: 10px 20px;
      display: none;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #lookup-bar.visible { display: flex; }
    .lookup-label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
    .lookup-input {
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .lookup-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    #lookup-tz {
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      cursor: pointer;
    }
    .btn {
      padding: 6px 14px;
      font-size: 12px; font-weight: 600;
      border: none; border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.12s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { color: var(--text); }
    .lookup-hint { font-size: 11px; color: var(--muted); }

    /* ── Clock Grid ── */
    #clock-grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    #clock-grid-wrap::-webkit-scrollbar { width: 4px; }
    #clock-grid-wrap::-webkit-scrollbar-track { background: transparent; }
    #clock-grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #clock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    /* ── Clock Card ── */
    .clock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-left-color 0.15s, background 0.15s;
    }
    .clock-card.is-reference {
      border-left-color: var(--accent);
    }
    .clock-card.is-reference .card-head {
      background: var(--accent-light);
      border-bottom-color: var(--accent-border);
    }

    .card-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 6px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      transition: background 0.15s;
    }
    .card-tz-name {
      font-size: 11px; font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
      word-break: break-all;
      line-height: 1.3;
    }
    .card-tz-label {
      font-size: 10.5px; color: var(--muted); margin-top: 2px;
    }
    .card-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 1px; }
    .card-btn {
      background: none; border: none; cursor: pointer;
      font-size: 13px; line-height: 1;
      padding: 2px 3px;
      border-radius: 3px;
      color: var(--muted);
      transition: background 0.1s, color 0.1s;
    }
    .card-btn:hover { background: var(--border); color: var(--text); }
    .card-btn.star-btn.is-ref { color: var(--accent); }

    .card-body { padding: 14px 14px 10px; flex: 1; }
    .card-time {
      font-family: var(--mono);
      font-size: 26px; font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .card-date {
      font-size: 11.5px; color: var(--muted);
      margin-top: 5px;
    }

    .card-foot {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 6px;
      background: var(--bg);
    }
    .card-offset {
      font-size: 11px; color: var(--muted);
      font-family: var(--mono);
    }
    .card-abbr {
      font-size: 11px; font-weight: 700;
      color: var(--accent);
      background: var(--accent-light);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .card-rel {
      font-size: 10.5px; color: var(--muted);
      text-align: right;
    }

    /* ── Empty State ── */
    #empty-state {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 60px 20px;
      color: var(--muted); text-align: center;
    }
    #empty-state.visible { display: flex; }
    #empty-state p { font-size: 13px; }

    /* ── Body layout ── */
    body { display: flex; flex-direction: column; }
    #main-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #clock-grid-wrap { flex: 1; overflow-y: auto; }

    /* ── Settings Overlay ── */
    #settings-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.35);
      z-index: 30;
    }
    #settings-backdrop.visible { display: block; }

    #settings-panel {
      position: fixed; left: 0; right: 0; bottom: 0;
      max-height: 72vh;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      z-index: 31;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    #settings-panel.visible { transform: translateY(0); }

    .sp-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sp-title { font-size: 14px; font-weight: 700; }
    .sp-close {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--muted);
      line-height: 1; padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.12s, background 0.12s;
    }
    .sp-close:hover { color: var(--text); background: var(--bg); }

    .sp-body {
      flex: 1; overflow-y: auto;
      padding: 16px 20px 20px;
    }
    .sp-body::-webkit-scrollbar { width: 4px; }
    .sp-body::-webkit-scrollbar-track { background: transparent; }
    .sp-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sp-section { margin-bottom: 22px; }
    .sp-section-title {
      font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* format toggles */
    .toggle-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .toggle-group { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .toggle-opt {
      padding: 5px 14px;
      font-size: 12px; font-weight: 600;
      background: none; border: none; cursor: pointer;
      color: var(--muted);
      transition: background 0.12s, color 0.12s;
    }
    .toggle-opt.active { background: var(--accent); color: #fff; }

    /* active clocks list */
    #active-list { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }
    .active-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: grab;
      user-select: none;
    }
    .active-row:active { cursor: grabbing; }
    .active-row.drag-over { border-color: var(--accent); background: var(--accent-light); }
    .active-row .drag-handle { color: #cbd5e1; font-size: 13px; flex-shrink: 0; }
    .active-row .row-star {
      background: none; border: none; cursor: pointer;
      font-size: 14px; color: var(--muted);
      padding: 0 2px; flex-shrink: 0;
      transition: color 0.1s;
    }
    .active-row .row-star.is-ref { color: var(--accent); }
    .active-row .row-info { flex: 1; min-width: 0; }
    .active-row .row-tz { font-size: 12px; font-weight: 600; color: var(--text); }
    .active-row .row-label { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .active-row .row-remove {
      background: none; border: none; cursor: pointer;
      font-size: 13px; color: #cbd5e1;
      padding: 2px 4px; border-radius: 3px;
      transition: color 0.1s, background 0.1s;
      flex-shrink: 0;
    }
    .active-row .row-remove:hover { color: var(--danger); background: var(--danger-light); }

    /* add timezone */
    #tz-search {
      width: 100%;
      padding: 7px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 8px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #tz-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); background: var(--surface); }

    #tz-available { display: flex; flex-direction: column; gap: 2px; max-height: 200px; overflow-y: auto; }
    #tz-available::-webkit-scrollbar { width: 3px; }
    #tz-available::-webkit-scrollbar-track { background: transparent; }
    #tz-available::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .avail-group-label {
      font-size: 9.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted);
      padding: 8px 4px 3px;
    }
    .avail-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .avail-row:not(.already-added):hover { background: var(--accent-light); }
    .avail-row.already-added { opacity: 0.45; cursor: default; pointer-events: none; }
    .avail-row .avail-tz { font-size: 12px; font-weight: 600; color: var(--text); }
    .avail-row .avail-label { font-size: 11px; color: var(--muted); }
    .avail-row .avail-check { font-size: 12px; color: var(--success); }

    /* import/export */
    .io-row { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: #1e293b; color: #f1f5f9;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 50;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }

    /* hidden file input */
    #import-file { display: none; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-title">World Clock</span>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-live">Live</button>
      <button class="mode-btn" id="btn-lookup">Lookup</button>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
  </div>
</header>

<div id="main-wrap">
  <!-- Lookup bar -->
  <div id="lookup-bar">
    <span class="lookup-label">Show time:</span>
    <input type="date" id="lookup-date" class="lookup-input" title="Date">
    <input type="time" id="lookup-time" class="lookup-input" title="Time (24-hour)" step="60">
    <span class="lookup-label">in</span>
    <select id="lookup-tz"></select>
    <button class="btn btn-primary" id="btn-apply">Apply</button>
    <span class="lookup-hint" id="lookup-hint"></span>
  </div>

  <!-- Clock grid -->
  <div id="clock-grid-wrap">
    <div id="clock-grid"></div>
    <div id="empty-state">
      <div style="font-size:32px">🕐</div>
      <p>No timezones configured.<br>Open settings to add some.</p>
    </div>
  </div>
</div>

<!-- Settings panel -->
<div id="settings-backdrop"></div>
<div id="settings-panel" role="dialog" aria-label="Settings">
  <div class="sp-header">
    <span class="sp-title">Settings</span>
    <button class="sp-close" id="btn-close-settings">✕</button>
  </div>
  <div class="sp-body">

    <div class="sp-section">
      <div class="sp-section-title">Display Format</div>
      <div class="toggle-row">
        <div class="toggle-group">
          <button class="toggle-opt" id="opt-12h">12h</button>
          <button class="toggle-opt" id="opt-24h">24h</button>
        </div>
        <div class="toggle-group">
          <button class="toggle-opt" id="opt-sec-on">Seconds</button>
          <button class="toggle-opt" id="opt-sec-off">Hide seconds</button>
        </div>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Active Clocks <span style="font-weight:400;color:#94a3b8">(drag to reorder · ★ sets reference)</span></div>
      <div id="active-list"></div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Add Timezone</div>
      <input type="text" id="tz-search" placeholder="🔍  Search timezones…" autocomplete="off" spellcheck="false">
      <div id="tz-available"></div>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Import / Export Settings</div>
      <div class="io-row">
        <button class="btn btn-primary" id="btn-export">⬇ Export settings</button>
        <button class="btn btn-ghost" id="btn-import-trigger">⬆ Import settings</button>
        <input type="file" id="import-file" accept=".json">
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────

const STORAGE_KEY = 'world_clock_v1';

const CURATED_ZONES = [
  { tz: 'UTC',                  label: 'UTC — Coordinated Universal Time',   region: 'Universal' },
  { tz: 'America/New_York',     label: 'Eastern Time (ET)',                  region: 'Americas' },
  { tz: 'America/Chicago',      label: 'Central Time (CT)',                  region: 'Americas' },
  { tz: 'America/Denver',       label: 'Mountain Time (MT)',                 region: 'Americas' },
  { tz: 'America/Los_Angeles',  label: 'Pacific Time (PT)',                  region: 'Americas' },
  { tz: 'America/Anchorage',    label: 'Alaska Time (AKT)',                  region: 'Americas' },
  { tz: 'America/Honolulu',     label: 'Hawaii Time (HST)',                  region: 'Americas' },
  { tz: 'America/Toronto',      label: 'Toronto (ET)',                       region: 'Americas' },
  { tz: 'America/Vancouver',    label: 'Vancouver (PT)',                     region: 'Americas' },
  { tz: 'America/Phoenix',      label: 'Phoenix / Arizona (no DST)',         region: 'Americas' },
  { tz: 'America/Sao_Paulo',    label: 'São Paulo / Brazil (BRT)',           region: 'Americas' },
  { tz: 'America/Argentina/Buenos_Aires', label: 'Buenos Aires (ART)',       region: 'Americas' },
  { tz: 'America/Mexico_City',  label: 'Mexico City (CST)',                  region: 'Americas' },
  { tz: 'Europe/London',        label: 'London (GMT / BST)',                 region: 'Europe' },
  { tz: 'Europe/Paris',         label: 'Paris / Berlin / Rome (CET/CEST)',   region: 'Europe' },
  { tz: 'Europe/Helsinki',      label: 'Helsinki / Kyiv (EET/EEST)',         region: 'Europe' },
  { tz: 'Europe/Moscow',        label: 'Moscow (MSK)',                       region: 'Europe' },
  { tz: 'Europe/Istanbul',      label: 'Istanbul (TRT)',                     region: 'Europe' },
  { tz: 'Africa/Lagos',         label: 'Lagos / West Africa (WAT)',          region: 'Africa' },
  { tz: 'Africa/Cairo',         label: 'Cairo (EET)',                        region: 'Africa' },
  { tz: 'Africa/Nairobi',       label: 'Nairobi / East Africa (EAT)',        region: 'Africa' },
  { tz: 'Africa/Johannesburg',  label: 'Johannesburg (SAST)',                region: 'Africa' },
  { tz: 'Asia/Dubai',           label: 'Dubai / Gulf (GST)',                 region: 'Asia' },
  { tz: 'Asia/Karachi',         label: 'Karachi (PKT)',                      region: 'Asia' },
  { tz: 'Asia/Kolkata',         label: 'India (IST, +5:30)',                 region: 'Asia' },
  { tz: 'Asia/Dhaka',           label: 'Dhaka / Bangladesh (BST, +6)',       region: 'Asia' },
  { tz: 'Asia/Bangkok',         label: 'Bangkok / Jakarta (ICT, +7)',        region: 'Asia' },
  { tz: 'Asia/Singapore',       label: 'Singapore / KL (SGT, +8)',           region: 'Asia' },
  { tz: 'Asia/Shanghai',        label: 'China Standard Time (CST, +8)',      region: 'Asia' },
  { tz: 'Asia/Tokyo',           label: 'Japan / Tokyo (JST)',                region: 'Asia' },
  { tz: 'Asia/Seoul',           label: 'Seoul / Korea (KST)',                region: 'Asia' },
  { tz: 'Australia/Perth',      label: 'Perth (AWST)',                       region: 'Pacific' },
  { tz: 'Australia/Sydney',     label: 'Sydney (AEST/AEDT)',                 region: 'Pacific' },
  { tz: 'Australia/Adelaide',   label: 'Adelaide (ACST/ACDT)',               region: 'Pacific' },
  { tz: 'Pacific/Auckland',     label: 'Auckland (NZST/NZDT)',               region: 'Pacific' },
];

// ─────────────────────────────────────────────────────────────
// Store
// ─────────────────────────────────────────────────────────────

const Store = {
  defaultConfig() {
    return {
      timezones: [
        'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles',
        'Europe/London', 'Europe/Paris', 'Asia/Kolkata', 'Asia/Tokyo', 'Australia/Sydney', 'UTC'
      ],
      referenceTz: 'America/New_York',
      use12h: true,
      showSeconds: true,
      mode: 'live',
    };
  },
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return this.defaultConfig();
      const parsed = JSON.parse(raw);
      const def = this.defaultConfig();
      return {
        timezones:   Array.isArray(parsed.timezones) && parsed.timezones.length ? parsed.timezones : def.timezones,
        referenceTz: typeof parsed.referenceTz === 'string' ? parsed.referenceTz : def.referenceTz,
        use12h:      typeof parsed.use12h === 'boolean' ? parsed.use12h : def.use12h,
        showSeconds: typeof parsed.showSeconds === 'boolean' ? parsed.showSeconds : def.showSeconds,
        mode:        parsed.mode === 'lookup' ? 'lookup' : 'live',
      };
    } catch (_) {
      return this.defaultConfig();
    }
  },
  save(cfg) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    } catch (_) {}
  },
};

// ─────────────────────────────────────────────────────────────
// TZ utilities
// ─────────────────────────────────────────────────────────────

const TZ = {
  // Returns UTC offset in minutes for a given IANA tz at a given Date.
  // Works by comparing the numeric date-parts rendered in UTC vs the target tz.
  getUtcOffsetMinutes(tz, date) {
    const opts = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    const toMs = (parts) => {
      const g = (t) => +parts.find(p => p.type === t).value;
      const h = g('hour') % 24; // guard 24→0 edge in some browsers
      return Date.UTC(g('year'), g('month') - 1, g('day'), h, g('minute'), g('second'));
    };
    const utcParts = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'UTC' }).formatToParts(date);
    const tzParts  = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: tz  }).formatToParts(date);
    return (toMs(tzParts) - toMs(utcParts)) / 60000;
  },

  // Returns the DST-aware abbreviation: 'EDT', 'EST', 'BST', 'GMT', 'IST', etc.
  getAbbreviation(tz, date) {
    try {
      const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'short' }).formatToParts(date);
      return parts.find(p => p.type === 'timeZoneName')?.value ?? '';
    } catch (_) {
      return '';
    }
  },

  formatOffset(offsetMinutes) {
    const sign = offsetMinutes >= 0 ? '+' : '−';
    const abs  = Math.abs(offsetMinutes);
    const h    = Math.floor(abs / 60);
    const m    = abs % 60;
    return m === 0 ? `UTC${sign}${h}` : `UTC${sign}${h}:${String(m).padStart(2, '0')}`;
  },

  formatTime(date, tz, use12h, showSeconds) {
    const opts = {
      timeZone: tz,
      hour: '2-digit',
      minute: '2-digit',
      hour12: use12h,
    };
    if (showSeconds) opts.second = '2-digit';
    return new Intl.DateTimeFormat('en-US', opts).format(date);
  },

  formatDate(date, tz) {
    return new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    }).format(date);
  },

  // Returns "+5h 30m vs IST" style string, or null if same offset as ref.
  getOffsetVsReference(tz, refTz, date) {
    if (tz === refTz) return null;
    const diff = this.getUtcOffsetMinutes(tz, date) - this.getUtcOffsetMinutes(refTz, date);
    if (diff === 0) return null;
    const sign = diff > 0 ? '+' : '−';
    const abs  = Math.abs(diff);
    const h    = Math.floor(abs / 60);
    const m    = abs % 60;
    const str  = (h > 0 ? `${h}h` : '') + (m > 0 ? ` ${m}m` : '');
    const refAbbr = this.getAbbreviation(refTz, date);
    return `${sign}${str.trim()} vs ${refAbbr}`;
  },

  // Label for a timezone from the curated list, fallback to tz string itself.
  getLabel(tz) {
    const found = CURATED_ZONES.find(z => z.tz === tz);
    if (!found) return tz;
    // Strip the parenthetical abbrev for a cleaner short label
    return found.label.replace(/\s*\(.*\)$/, '').trim();
  },
};

// ─────────────────────────────────────────────────────────────
// Lookup Mode
// ─────────────────────────────────────────────────────────────

const LookupMode = {
  parseInputToDate(dateStr, timeStr, refTz) {
    if (!dateStr || !timeStr) return null;
    // Treat the user's input as wall-clock time in refTz.
    // Step 1: build a naive UTC timestamp (as if the input were UTC)
    const naiveMs = Date.parse(`${dateStr}T${timeStr}:00Z`);
    if (isNaN(naiveMs)) return null;
    // Step 2: find refTz's UTC offset at that naive moment, then adjust
    const offsetMin = TZ.getUtcOffsetMinutes(refTz, new Date(naiveMs));
    return new Date(naiveMs - offsetMin * 60000);
  },
};

// ─────────────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────────────

let cfg = Store.load();
let tickInterval = null;
let lookupDate = null; // null = live mode

const UI = {
  // ── init ──
  init() {
    this.bindHeader();
    this.bindLookupBar();
    this.bindSettings();
    this.renderSettingsPanel();
    if (cfg.mode === 'lookup') {
      this.switchMode('lookup');
    } else {
      this.switchMode('live');
    }
  },

  // ── mode ──
  switchMode(mode) {
    cfg.mode = mode;
    Store.save(cfg);

    const btnLive   = document.getElementById('btn-live');
    const btnLookup = document.getElementById('btn-lookup');
    const lookupBar = document.getElementById('lookup-bar');

    btnLive.classList.toggle('active', mode === 'live');
    btnLookup.classList.toggle('active', mode === 'lookup');
    lookupBar.classList.toggle('visible', mode === 'lookup');

    if (mode === 'live') {
      lookupDate = null;
      document.getElementById('lookup-hint').textContent = '';
      this.startLiveTick();
    } else {
      this.stopLiveTick();
      this.populateLookupTzSelect();
      // Set defaults for date/time inputs if blank
      const dateEl = document.getElementById('lookup-date');
      const timeEl = document.getElementById('lookup-time');
      if (!dateEl.value) {
        const now = new Date();
        dateEl.value = now.toLocaleDateString('en-CA'); // YYYY-MM-DD
      }
      if (!timeEl.value) {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        timeEl.value = `${hh}:${mm}`;
      }
      // Auto-apply
      this.applyLookup();
    }
  },

  // ── live tick ──
  startLiveTick() {
    this.stopLiveTick();
    this.renderGrid(new Date());
    tickInterval = setInterval(() => this.renderGrid(new Date()), 1000);
  },
  stopLiveTick() {
    if (tickInterval !== null) { clearInterval(tickInterval); tickInterval = null; }
  },

  // ── lookup ──
  populateLookupTzSelect() {
    const sel = document.getElementById('lookup-tz');
    sel.innerHTML = '';
    cfg.timezones.forEach(tz => {
      const opt = document.createElement('option');
      opt.value = tz;
      opt.textContent = tz;
      if (tz === cfg.referenceTz) opt.selected = true;
      sel.appendChild(opt);
    });
  },
  applyLookup() {
    const dateStr = document.getElementById('lookup-date').value;
    const timeStr = document.getElementById('lookup-time').value;
    const refTz   = document.getElementById('lookup-tz').value;
    const hint    = document.getElementById('lookup-hint');

    if (!dateStr || !timeStr) {
      hint.textContent = 'Enter both date and time.';
      return;
    }
    const d = LookupMode.parseInputToDate(dateStr, timeStr, refTz);
    if (!d) {
      hint.textContent = 'Invalid date/time.';
      return;
    }
    lookupDate = d;
    hint.textContent = '';
    this.renderGrid(d);
  },

  // ── grid ──
  renderGrid(date) {
    const grid  = document.getElementById('clock-grid');
    const empty = document.getElementById('empty-state');

    if (!cfg.timezones.length) {
      grid.style.display = 'none';
      empty.classList.add('visible');
      return;
    }
    grid.style.display = '';
    empty.classList.remove('visible');

    // First render: build all cards from scratch
    if (grid.children.length !== cfg.timezones.length) {
      grid.innerHTML = '';
      cfg.timezones.forEach(tz => {
        grid.appendChild(this.buildCard(tz));
      });
    }

    // Update card content (fast path — no DOM rebuild)
    cfg.timezones.forEach(tz => {
      this.updateCard(tz, date);
    });
  },

  buildCard(tz) {
    const isRef = tz === cfg.referenceTz;
    const label = TZ.getLabel(tz);

    const card = document.createElement('div');
    card.className = 'clock-card' + (isRef ? ' is-reference' : '');
    card.dataset.tz = tz;

    card.innerHTML = `
      <div class="card-head">
        <div>
          <div class="card-tz-name">${tz}</div>
          <div class="card-tz-label">${label}</div>
        </div>
        <div class="card-actions">
          <button class="card-btn star-btn${isRef ? ' is-ref' : ''}" data-action="ref" data-tz="${tz}" title="Set as reference">★</button>
          <button class="card-btn remove-btn" data-action="remove" data-tz="${tz}" title="Remove">✕</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-time" data-field="time"></div>
        <div class="card-date" data-field="date"></div>
      </div>
      <div class="card-foot">
        <div>
          <span class="card-abbr" data-field="abbr"></span>
          <span class="card-offset" data-field="offset"></span>
        </div>
        <div class="card-rel" data-field="rel"></div>
      </div>
    `;
    return card;
  },

  updateCard(tz, date) {
    const card = document.querySelector(`.clock-card[data-tz="${CSS.escape(tz)}"]`);
    if (!card) return;

    const isRef = tz === cfg.referenceTz;
    card.classList.toggle('is-reference', isRef);

    const starBtn = card.querySelector('.star-btn');
    starBtn.classList.toggle('is-ref', isRef);

    const offsetMin = TZ.getUtcOffsetMinutes(tz, date);
    const abbr      = TZ.getAbbreviation(tz, date);
    const relStr    = TZ.getOffsetVsReference(tz, cfg.referenceTz, date);

    card.querySelector('[data-field="time"]').textContent   = TZ.formatTime(date, tz, cfg.use12h, cfg.showSeconds);
    card.querySelector('[data-field="date"]').textContent   = TZ.formatDate(date, tz);
    card.querySelector('[data-field="abbr"]').textContent   = abbr;
    card.querySelector('[data-field="offset"]').textContent = ' · ' + TZ.formatOffset(offsetMin);
    card.querySelector('[data-field="rel"]').textContent    = relStr ?? '';
  },

  // ── header bindings ──
  bindHeader() {
    document.getElementById('btn-live').addEventListener('click',     () => this.switchMode('live'));
    document.getElementById('btn-lookup').addEventListener('click',   () => this.switchMode('lookup'));
    document.getElementById('btn-settings').addEventListener('click', () => this.openSettings());

    // Card-level actions via event delegation on grid
    document.getElementById('clock-grid').addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const tz     = btn.dataset.tz;
      const action = btn.dataset.action;
      if (action === 'ref') {
        cfg.referenceTz = tz;
        Store.save(cfg);
        const currentDate = lookupDate ?? new Date();
        this.renderGrid(currentDate);
        this.renderSettingsPanel();
      } else if (action === 'remove') {
        this.removeTz(tz);
      }
    });
  },

  // ── lookup bar bindings ──
  bindLookupBar() {
    document.getElementById('btn-apply').addEventListener('click', () => this.applyLookup());
    document.getElementById('lookup-date').addEventListener('keydown', e => { if (e.key === 'Enter') this.applyLookup(); });
    document.getElementById('lookup-time').addEventListener('keydown', e => { if (e.key === 'Enter') this.applyLookup(); });
  },

  // ── settings bindings ──
  bindSettings() {
    document.getElementById('settings-backdrop').addEventListener('click', () => this.closeSettings());
    document.getElementById('btn-close-settings').addEventListener('click', () => this.closeSettings());

    // Format toggles
    document.getElementById('opt-12h').addEventListener('click',      () => this.setFormat(true,  null));
    document.getElementById('opt-24h').addEventListener('click',      () => this.setFormat(false, null));
    document.getElementById('opt-sec-on').addEventListener('click',   () => this.setFormat(null,  true));
    document.getElementById('opt-sec-off').addEventListener('click',  () => this.setFormat(null,  false));

    // Timezone search
    document.getElementById('tz-search').addEventListener('input', e => this.renderAvailableZones(e.target.value));

    // Import/export
    document.getElementById('btn-export').addEventListener('click', () => this.exportSettings());
    document.getElementById('btn-import-trigger').addEventListener('click', () => {
      document.getElementById('import-file').click();
    });
    document.getElementById('import-file').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) this.importSettings(file);
      e.target.value = ''; // reset so the same file can be re-imported
    });
  },

  openSettings() {
    this.renderSettingsPanel();
    document.getElementById('settings-backdrop').classList.add('visible');
    document.getElementById('settings-panel').classList.add('visible');
  },
  closeSettings() {
    document.getElementById('settings-backdrop').classList.remove('visible');
    document.getElementById('settings-panel').classList.remove('visible');
  },

  // ── render settings panel ──
  renderSettingsPanel() {
    // Format toggles
    document.getElementById('opt-12h').classList.toggle('active',    cfg.use12h);
    document.getElementById('opt-24h').classList.toggle('active',   !cfg.use12h);
    document.getElementById('opt-sec-on').classList.toggle('active',  cfg.showSeconds);
    document.getElementById('opt-sec-off').classList.toggle('active', !cfg.showSeconds);

    // Active list
    this.renderActiveList();

    // Available zones
    this.renderAvailableZones(document.getElementById('tz-search')?.value ?? '');
  },

  renderActiveList() {
    const list = document.getElementById('active-list');
    list.innerHTML = '';

    cfg.timezones.forEach((tz, idx) => {
      const isRef = tz === cfg.referenceTz;
      const label = TZ.getLabel(tz);

      const row = document.createElement('div');
      row.className = 'active-row';
      row.draggable = true;
      row.dataset.idx = idx;
      row.dataset.tz  = tz;

      row.innerHTML = `
        <span class="drag-handle">⠿</span>
        <button class="row-star${isRef ? ' is-ref' : ''}" data-tz="${tz}" title="Set as reference">${isRef ? '★' : '☆'}</button>
        <div class="row-info">
          <div class="row-tz">${tz}</div>
          <div class="row-label">${label}</div>
        </div>
        <button class="row-remove" data-tz="${tz}" title="Remove">✕</button>
      `;

      // Star click
      row.querySelector('.row-star').addEventListener('click', () => {
        cfg.referenceTz = tz;
        Store.save(cfg);
        this.renderActiveList();
        const currentDate = lookupDate ?? new Date();
        this.renderGrid(currentDate);
        if (cfg.mode === 'lookup') this.populateLookupTzSelect();
      });

      // Remove click
      row.querySelector('.row-remove').addEventListener('click', () => this.removeTz(tz));

      // Drag-and-drop reorder
      row.addEventListener('dragstart', e => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(idx));
        row.style.opacity = '0.5';
      });
      row.addEventListener('dragend', () => { row.style.opacity = ''; });
      row.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        row.classList.add('drag-over');
      });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault();
        row.classList.remove('drag-over');
        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
        const toIdx   = idx;
        if (fromIdx === toIdx) return;
        const arr = [...cfg.timezones];
        const [moved] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, moved);
        cfg.timezones = arr;
        Store.save(cfg);
        this.renderActiveList();
        const currentDate = lookupDate ?? new Date();
        this.renderGrid(currentDate);
        if (cfg.mode === 'lookup') this.populateLookupTzSelect();
      });

      list.appendChild(row);
    });
  },

  renderAvailableZones(query) {
    const container = document.getElementById('tz-available');
    const q = (query || '').toLowerCase();

    const filtered = CURATED_ZONES.filter(z =>
      !q || z.tz.toLowerCase().includes(q) || z.label.toLowerCase().includes(q)
    );

    if (!filtered.length) {
      container.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 4px">No timezones match.</div>';
      return;
    }

    // Group by region
    const regions = {};
    filtered.forEach(z => {
      if (!regions[z.region]) regions[z.region] = [];
      regions[z.region].push(z);
    });

    container.innerHTML = '';
    Object.entries(regions).forEach(([region, zones]) => {
      if (!q) {
        const lbl = document.createElement('div');
        lbl.className = 'avail-group-label';
        lbl.textContent = region;
        container.appendChild(lbl);
      }
      zones.forEach(z => {
        const isActive = cfg.timezones.includes(z.tz);
        const row = document.createElement('div');
        row.className = 'avail-row' + (isActive ? ' already-added' : '');

        row.innerHTML = `
          <div>
            <div class="avail-tz">${z.tz}</div>
            <div class="avail-label">${z.label}</div>
          </div>
          ${isActive ? '<span class="avail-check">✓</span>' : ''}
        `;

        if (!isActive) {
          row.addEventListener('click', () => {
            cfg.timezones.push(z.tz);
            Store.save(cfg);
            this.renderActiveList();
            this.renderAvailableZones(document.getElementById('tz-search').value);
            const currentDate = lookupDate ?? new Date();
            document.getElementById('clock-grid').innerHTML = ''; // force rebuild
            this.renderGrid(currentDate);
            if (cfg.mode === 'lookup') this.populateLookupTzSelect();
            this.toast(`Added ${z.tz}`);
          });
        }
        container.appendChild(row);
      });
    });
  },

  // ── helpers ──
  setFormat(use12h, showSeconds) {
    if (use12h !== null)      cfg.use12h      = use12h;
    if (showSeconds !== null) cfg.showSeconds = showSeconds;
    Store.save(cfg);
    document.getElementById('opt-12h').classList.toggle('active',    cfg.use12h);
    document.getElementById('opt-24h').classList.toggle('active',   !cfg.use12h);
    document.getElementById('opt-sec-on').classList.toggle('active',  cfg.showSeconds);
    document.getElementById('opt-sec-off').classList.toggle('active', !cfg.showSeconds);
    const currentDate = lookupDate ?? new Date();
    this.renderGrid(currentDate);
  },

  removeTz(tz) {
    if (cfg.timezones.length <= 1) {
      this.toast('Keep at least one timezone.', true);
      return;
    }
    cfg.timezones = cfg.timezones.filter(t => t !== tz);
    if (cfg.referenceTz === tz) cfg.referenceTz = cfg.timezones[0];
    Store.save(cfg);
    document.getElementById('clock-grid').innerHTML = ''; // force rebuild
    const currentDate = lookupDate ?? new Date();
    this.renderGrid(currentDate);
    this.renderSettingsPanel();
    if (cfg.mode === 'lookup') this.populateLookupTzSelect();
  },

  // ── import / export ──
  exportSettings() {
    const json = JSON.stringify(cfg, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'world_clock_settings.json';
    a.click();
    URL.revokeObjectURL(url);
    this.toast('Settings exported.');
  },

  importSettings(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!Array.isArray(parsed.timezones) || !parsed.timezones.length) {
          throw new Error('Missing timezones array');
        }
        cfg = {
          timezones:   parsed.timezones,
          referenceTz: typeof parsed.referenceTz === 'string' ? parsed.referenceTz : parsed.timezones[0],
          use12h:      typeof parsed.use12h === 'boolean' ? parsed.use12h : true,
          showSeconds: typeof parsed.showSeconds === 'boolean' ? parsed.showSeconds : true,
          mode:        parsed.mode === 'lookup' ? 'lookup' : 'live',
        };
        // Ensure referenceTz is in the list
        if (!cfg.timezones.includes(cfg.referenceTz)) cfg.referenceTz = cfg.timezones[0];
        Store.save(cfg);
        document.getElementById('clock-grid').innerHTML = '';
        this.renderSettingsPanel();
        if (cfg.mode === 'lookup') {
          this.switchMode('lookup');
        } else {
          this.switchMode('live');
        }
        this.toast(`Imported ${cfg.timezones.length} timezone(s).`);
      } catch (err) {
        this.toast('Import failed: invalid settings file.', true);
      }
    };
    reader.readAsText(file);
  },

  // ── toast ──
  toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'show' + (isError ? ' error' : '');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => { el.className = ''; }, 2400);
  },
};

// ─────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────

UI.init();
</script>
</body>
